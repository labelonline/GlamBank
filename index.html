<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamBank | Лейбл переходник</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --bg-body: #0A0A0A; --bg-panel: #111111; --bg-glass: rgba(255, 255, 255, 0.03); --border: #222222; --text-main: #FFFFFF; --text-muted: #888888; --accent: #FFFFFF; --accent-bg: #E5E5E5; --danger: #FF3B30; --success: #34C759; --warning: #FF9500; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow: hidden; font-size: 14px; }
        .hidden { display: none !important; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: var(--bg-panel); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-body); position: relative; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; width: 100%; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 14px 16px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 14px; }
        input:focus { border-color: #555; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.1s; font-size: 14px; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .menu-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 12px 16px; color: var(--text-muted); border-radius: 8px; margin-bottom: 4px; }
        .menu-btn.active { background: var(--bg-glass); color: var(--text-main); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; }
        .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .card-cover { width: 84px; height: 84px; border-radius: 8px; object-fit: cover; margin-right: 20px; border: 1px solid var(--border); }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 24px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px 24px; border-radius: var(--radius); text-align: center; }
        .stat-num { font-size: 40px; font-weight: 700; margin-bottom: 8px; }
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .badge-mod { background: rgba(255, 149, 0, 0.15); color: var(--warning); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .dialog { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 400px; }
        .upload-box { width: 100%; max-width: 300px; aspect-ratio: 1; border: 1px dashed var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: var(--bg-glass); }
        .track-list-item { background: #000; border: 1px solid var(--border); padding: 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="uiAlert" class="overlay hidden"><div class="dialog"><h3 id="uiAlertTitle"></h3><p id="uiAlertText" style="margin: 15px 0 25px; color: #ccc;"></p><button class="btn-primary" onclick="document.getElementById('uiAlert').classList.add('hidden')">Понятно</button></div></div>

    <div id="uiDraftConfirm" class="overlay hidden">
        <div class="dialog">
            <h3>Есть изменения</h3><p style="margin: 15px 0 25px; color: #ccc;">Сохранить черновик или удалить его?</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-primary" id="draftSaveBtn">Сохранить черновик</button>
                <button class="btn-outline" style="color:var(--danger)" id="draftDeleteBtn">Удалить изменения</button>
                <button class="btn-outline" onclick="document.getElementById('uiDraftConfirm').classList.add('hidden')">Вернуться</button>
            </div>
        </div>
    </div>

    <div id="appView" class="app">
        <div class="sidebar">
            <h2 style="margin-bottom: 30px;">GlamBank</h2>
            <button class="btn-primary" style="margin-bottom: 20px;" onclick="startNewRelease()">+ Новый релиз</button>
            <button class="menu-btn active" id="m-overview" onclick="nav('overview')">Обзор</button>
            <button class="menu-btn" id="m-yourMusic" onclick="nav('yourMusic')">Ваша музыка</button>
            <div style="margin-top: 15px; padding-left: 16px; font-size: 11px; color: var(--text-muted);">ПОДДЕРЖКА</div>
            <button class="menu-btn" id="m-userChat" onclick="nav('userChat')">Связь с модератором</button>
            <div style="margin-top: auto;">
                <p id="userNameDisplay" style="font-weight: 600; margin-bottom: 5px;">Артист</p>
                <p style="color: var(--danger); cursor: pointer; font-size: 12px;" onclick="location.reload()">Выйти</p>
            </div>
        </div>

        <div class="content">
            <div id="sec-overview" class="view-section">
                <h1>Обзор</h1>
                <div class="stat-grid" id="statsContainer"></div>
            </div>

            <div id="sec-yourMusic" class="view-section hidden">
                <h1>Ваша музыка</h1>
                <div id="userReleasesList"></div>
            </div>

            <div id="sec-userChat" class="view-section hidden">
                <h1>Поддержка</h1>
                <div id="chatContainer" style="height: 400px; border: 1px solid var(--border); border-radius: 8px; margin-top: 20px;"></div>
            </div>

            <div id="sec-newRelease" class="view-section hidden">
                <div style="display: flex; gap: 40px;">
                    <div style="flex: 1;">
                        <h2>Основная информация</h2>
                        <div class="form-group"><label>Формат *</label><select id="r_type" onchange="toggleTracks(); isChanged=true;"><option value="">Выберите...</option><option value="Сингл">Сингл</option><option value="Альбом/EP">Альбом/EP</option></select></div>
                        <div class="form-group"><label>Название *</label><input type="text" id="r_title" oninput="isChanged=true;"></div>
                        <div class="form-group"><label>Артист *</label><input type="text" id="r_artist" oninput="isChanged=true;"></div>
                        <div style="display: flex; gap: 15px;">
                            <div class="form-group" style="flex:1;"><label>Жанр *</label><select id="r_genre"><option>Pop</option><option>Hip Hop</option></select></div>
                            <div class="form-group" style="flex:1;"><label>Год *</label><select id="r_year"></select></div>
                        </div>
                        <div class="form-group"><label>Дата выхода *</label><input type="date" id="r_date"></div>
                    </div>
                    <div style="width: 250px;">
                        <label style="font-size: 12px; color: var(--text-muted);">Обложка *</label>
                        <div class="upload-box" onclick="document.getElementById('f_cover').click()">
                            <img id="coverPrev" class="hidden" style="width:100%; height:100%; object-fit:cover; position:absolute;">
                            <span id="coverHint">1400x1400+</span>
                            <input type="file" id="f_cover" class="hidden" accept="image/*" onchange="previewImg(this)">
                        </div>
                    </div>
                </div>
                <div id="tracksArea" class="hidden" style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <h3>Треклист</h3>
                    <div id="trackList" style="margin: 15px 0;"></div>
                    <button class="btn-outline" onclick="document.getElementById('f_audio').click()">+ Добавить трек</button>
                    <input type="file" id="f_audio" class="hidden" accept="audio/*" onchange="addTrackItem(this)">
                    <button class="btn-primary" style="margin-top: 30px; padding: 15px;" onclick="submitFinal()">Отправить релиз</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCha28N_EYVSNtYlSjYtY8IPCbK3PMo5EU",
        authDomain: "glambank.firebaseapp.com",
        databaseURL: "https://glambank-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "glambank",
        storageBucket: "glambank.firebasestorage.app",
        messagingSenderId: "727584536839",
        appId: "1:727584536839:web:7738aa5e220799e7e32da2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = { email: "user@test.com", login: "Артист" }; // Тест
    let currentSection = 'overview';
    let isChanged = false;
    let releases = [];
    let draft = { cover: null, tracks: [] };

    // Настройка лет 2000-2026
    const ySel = document.getElementById('r_year');
    for(let y=2026; y>=2000; y--) ySel.innerHTML += `<option value="${y}">${y}</option>`;

    function nav(id, force = false) {
        if(currentSection === 'newRelease' && isChanged && !force) {
            document.getElementById('uiDraftConfirm').classList.remove('hidden');
            document.getElementById('draftSaveBtn').onclick = () => { saveDraft(); document.getElementById('uiDraftConfirm').classList.add('hidden'); nav(id, true); };
            document.getElementById('draftDeleteBtn').onclick = () => { isChanged = false; document.getElementById('uiDraftConfirm').classList.add('hidden'); nav(id, true); };
            return;
        }
        currentSection = id;
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('m-'+id);
        if(activeBtn) activeBtn.classList.add('active');
        
        if(id === 'overview') renderStats();
        if(id === 'yourMusic') renderMusic();
    }

    function previewImg(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            draft.cover = e.target.result;
            document.getElementById('coverPrev').src = e.target.result;
            document.getElementById('coverPrev').classList.remove('hidden');
            document.getElementById('coverHint').classList.add('hidden');
            isChanged = true;
        };
        reader.readAsDataURL(file);
    }

    function addTrackItem(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            draft.tracks.push({ title: file.name, data: e.target.result });
            renderTracks();
            isChanged = true;
        };
        reader.readAsDataURL(file);
    }

    function renderTracks() {
        const list = document.getElementById('trackList');
        list.innerHTML = draft.tracks.map((t, i) => `<div class="track-list-item"><span>${i+1}. ${t.title}</span><button class="btn-outline" style="color:var(--danger)" onclick="draft.tracks.splice(${i},1); renderTracks();">Удалить</button></div>`).join('');
    }

    function toggleTracks() { document.getElementById('tracksArea').classList.toggle('hidden', !document.getElementById('r_type').value); }

    function startNewRelease() { 
        draft = { cover: null, tracks: [] }; 
        isChanged = false;
        document.getElementById('coverPrev').classList.add('hidden');
        document.getElementById('coverHint').classList.remove('hidden');
        document.getElementById('trackList').innerHTML = '';
        nav('newRelease', true); 
    }

    function renderMusic() {
        const list = document.getElementById('userReleasesList');
        const my = releases.filter(r => r.user === currentUser.email);
        list.innerHTML = my.length ? my.map(r => `
            <div class="card fade-in">
                <div style="display:flex; align-items:center;">
                    <img src="${r.cover}" class="card-cover">
                    <div>
                        <div style="font-weight:700; font-size:18px;">${r.title}</div>
                        <div style="color:var(--text-muted);">${r.artist}</div>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
                    <span class="badge badge-mod">${r.status}</span>
                    <button class="btn-outline" style="font-size:11px; padding:5px 10px;" onclick="revoke('${r.id}')">Отозвать</button>
                </div>
            </div>
        `).reverse().join('') : '<div style="text-align:center; padding:50px; color:#555;">Нет релизов</div>';
    }

    function renderStats() {
        const my = releases.filter(r => r.user === currentUser.email);
        const mod = my.filter(r => r.status === 'Модерация').length;
        document.getElementById('statsContainer').innerHTML = `<div class="stat-card"><div class="stat-num" style="color:var(--warning)">${mod}</div><div>МОДЕРАЦИЯ</div></div><div class="stat-card"><div class="stat-num">0</div><div>ОДОБРЕНО</div></div><div class="stat-card"><div class="stat-num">0</div><div>ОТКЛОНЕНО</div></div>`;
    }

    function saveDraft() { db.ref('releases').push({ ...draft, title: document.getElementById('r_title').value || 'Черновик', user: currentUser.email, status: 'Черновик' }); isChanged = false; }
    
    function submitFinal() {
        const r = {
            id: Date.now(),
            title: document.getElementById('r_title').value,
            artist: document.getElementById('r_artist').value,
            cover: draft.cover,
            tracks: draft.tracks,
            status: 'Модерация',
            user: currentUser.email
        };
        db.ref('releases').push(r);
        isChanged = false;
        nav('yourMusic', true);
    }

    db.ref('releases').on('value', snap => {
        const val = snap.val();
        releases = val ? Object.entries(val).map(([id, data]) => ({ id, ...data })) : [];
        if(currentSection === 'yourMusic') renderMusic();
        if(currentSection === 'overview') renderStats();
    });

</script>
</body>
</html>
