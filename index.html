<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlamBank | Лейбл переходник</title>
    <!-- Google Fonts & modern reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C12;
            color: #EFF3F8;
        }

        /* тёмно-синяя гамма */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* sidebar */
        .sidebar {
            width: 280px;
            background: #0F1219;
            border-right: 1px solid #1E2432;
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .logo-area {
            margin-bottom: 8px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 0%, #94A3F8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge-sub {
            font-size: 11px;
            color: #5B6B8C;
            margin-top: 4px;
            letter-spacing: 0.3px;
            background: rgba(59, 130, 246, 0.12);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-item {
            background: transparent;
            border: none;
            color: #B4C2E0;
            font-size: 16px;
            font-weight: 500;
            text-align: left;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .nav-item:hover {
            background: #181E2A;
            color: white;
        }

        .nav-item.active {
            background: #1A2538;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .new-release-btn {
            border: 1.5px solid #3B82F6 !important;
            background: rgba(59, 130, 246, 0.08) !important;
            color: #60A5FA !important;
            font-weight: 600;
            margin-top: 8px;
            text-align: center;
            justify-content: center;
        }

        .new-release-btn:hover {
            background: #1E3A8A !important;
            border-color: #60A5FA !important;
            color: white !important;
        }

        .user-profile-side {
            margin-top: auto;
            background: #0A0D14;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .user-profile-side:hover {
            background: #151E2C;
        }

        .user-avatar-placeholder {
            width: 40px;
            height: 40px;
            background: #1F2A44;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* main content */
        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        /* cards & таблицы */
        .card {
            background: #11161F;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #202836;
        }

        .release-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .release-card {
            background: #0E121C;
            border-radius: 20px;
            padding: 20px;
            border-left: 4px solid #2D3E6E;
            transition: 0.1s;
        }

        .release-header {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .cover-thumb {
            width: 80px;
            height: 80px;
            background: #1A1F2E;
            border-radius: 12px;
            object-fit: cover;
        }

        .release-info {
            flex: 1;
        }

        .release-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .release-meta {
            font-size: 13px;
            color: #8A99B9;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }

        .status-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 100px;
            display: inline-block;
        }

        .status-moderation { background: #b45309; color: #ffedd5; }
        .status-approved { background: #0f6e3f; color: #d1fae5; }
        .status-rejected { background: #991b1b; color: #fee2e2; }
        
        .warning-yellow {
            background: #F59E0B20;
            color: #FBBF24;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .button-icon {
            background: #1E293B;
            border: none;
            color: #CBD5E1;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
        }

        /* формы */
        .two-column-form {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }
        .cover-square {
            width: 220px;
            height: 220px;
            background: #0F1320;
            border-radius: 24px;
            border: 1px dashed #3B82F6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .form-fields {
            flex: 1;
            min-width: 280px;
        }
        .form-field {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #B9C7E4;
        }
        input, select, textarea {
            width: 100%;
            background: #0B0F17;
            border: 1px solid #26304A;
            border-radius: 14px;
            padding: 12px 14px;
            color: white;
            font-family: inherit;
            font-size: 14px;
        }
        button {
            cursor: pointer;
        }
        .btn-primary {
            background: #1E3A8A;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }
        .modal-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: #0F172A;
            border-radius: 32px;
            padding: 28px;
            width: 450px;
            max-width: 90%;
            border: 1px solid #334155;
        }
        hr {
            border-color: #1E2A3A;
        }
        .admin-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .admin-tab {
            background: #1E293B;
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            color: white;
        }
        .admin-tab.active {
            background: #3B82F6;
        }
        .error-msg {
            color: #F87171;
            font-size: 12px;
            margin-top: 5px;
        }
        @media (max-width: 700px) {
            .sidebar { width: 100px; padding: 20px 12px; }
            .nav-item span:not(.first-letter) { display: none; }
            .main-content { padding: 20px; }
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .info-icon { cursor: help; margin-left: 6px; background: #2D3748; border-radius: 50%; width: 18px; display: inline-block; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-router-dom@6.14.2/umd/react-router-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
<script type="text/babel">
    // ---- UTILS & CONSTANTS ----
    const { useState, useEffect } = React;
    const { createRoot } = ReactDOM;
    const { BrowserRouter, Routes, Route, Link, useNavigate, Navigate } = ReactRouterDOM;

    // Жанры (большой массив)
    const GENRES = ["Pop","Rock","Hip Hop/Rap","Electronic","Dance","R&B","Soul","Jazz","Classical","Country","Folk","Metal","Punk","Reggae","Blues","Latin","K-pop","Indie","Alternative","House","Techno","Trance","Drum and Bass","Ambient","Soundtrack","Trap","Grime","Afrobeat","Funk","Disco"];

    const YEARS = Array.from({ length: 2026-2000+1 }, (_, i) => 2026 - i);
    const TRACK_TYPES = ["Original","Cover","Cover by cover band","Karaoke","Medley","Remix"];
    const EXPLICIT_OPTS = ["Да","Нет"];

    // инициализация localStorage
    const initStorage = () => {
        if(!localStorage.getItem("glambank_users")){
            const admin = {
                id: "admin_main",
                login: "GlamBankAdmin",
                email: "denisbiletskiy0@gmail.com",
                password: "Retro!22848.lol",
                isBanned: false,
                banReason: "",
                role: "admin"
            };
            localStorage.setItem("glambank_users", JSON.stringify([admin]));
        }
        if(!localStorage.getItem("glambank_releases")) localStorage.setItem("glambank_releases", JSON.stringify([]));
        if(!localStorage.getItem("glambank_email_requests")) localStorage.setItem("glambank_email_requests", JSON.stringify([]));
        if(!localStorage.getItem("glambank_current_user")) localStorage.removeItem("glambank_current_user");
    };
    initStorage();

    const getUsers = () => JSON.parse(localStorage.getItem("glambank_users"));
    const saveUsers = (users) => localStorage.setItem("glambank_users", JSON.stringify(users));
    const getReleases = () => JSON.parse(localStorage.getItem("glambank_releases"));
    const saveReleases = (rels) => localStorage.setItem("glambank_releases", JSON.stringify(rels));
    const getEmailReqs = () => JSON.parse(localStorage.getItem("glambank_email_requests")) || [];
    const saveEmailReqs = (reqs) => localStorage.setItem("glambank_email_requests", JSON.stringify(reqs));

    // проверка существования email (базовая + уникальность)
    const isRealEmail = (email) => {
        const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return re.test(email);
    };

    // ---- Компоненты ----
    const LoginRegister = ({ setAuthUser }) => {
        const [isLogin, setIsLogin] = useState(true);
        const [form, setForm] = useState({ email: "", login: "", password: "" });
        const [error, setError] = useState("");
        const navigate = useNavigate();

        const handleSubmit = (e) => {
            e.preventDefault();
            setError("");
            if(isLogin){
                const users = getUsers();
                const user = users.find(u => u.email === form.email && u.password === form.password);
                if(!user) setError("Неверная почта или пароль");
                else if(user.isBanned) setError(`Ваш кабинет заблокирован. Причина: ${user.banReason || "обратитесь в поддержку"}`);
                else {
                    localStorage.setItem("glambank_current_user", JSON.stringify({ id: user.id, email: user.email, login: user.login, role: user.role || "user", isBanned: false }));
                    setAuthUser(user);
                    navigate("/");
                }
            } else {
                if(!isRealEmail(form.email)) return setError("Введите реально существующий email (проверка формата)");
                const users = getUsers();
                if(users.find(u => u.email === form.email)) return setError("Пользователь с таким email уже существует");
                if(!form.login.trim() || !form.password.trim()) return setError("Заполните логин и пароль");
                const newUser = { id: Date.now().toString(), login: form.login, email: form.email, password: form.password, isBanned: false, banReason: "", role: "user" };
                users.push(newUser);
                saveUsers(users);
                localStorage.setItem("glambank_current_user", JSON.stringify({ id: newUser.id, email: newUser.email, login: newUser.login, role: "user" }));
                setAuthUser(newUser);
                navigate("/");
            }
        };

        return (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#0A0C12" }}>
                <div className="card" style={{ width: "420px" }}>
                    <h2 style={{ marginBottom: "20px" }}>{isLogin ? "Войти в кабинет" : "Создать кабинет"}</h2>
                    <form onSubmit={handleSubmit}>
                        <div className="form-field">
                            <label>Почта</label>
                            <input type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} required />
                        </div>
                        {!isLogin && <div className="form-field"><label>Логин</label><input value={form.login} onChange={e=>setForm({...form, login:e.target.value})} required /></div>}
                        <div className="form-field"><label>Пароль</label><input type="password" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} required /></div>
                        {error && <div className="error-msg">{error}</div>}
                        <button type="submit" className="btn-primary" style={{ width: "100%", marginTop: "12px" }}>{isLogin ? "Войти" : "Зарегистрироваться"}</button>
                        <p style={{ marginTop: "16px", fontSize: "14px", textAlign: "center" }}><span style={{cursor:"pointer", color:"#60A5FA"}} onClick={()=>{setIsLogin(!isLogin); setError("");}}>{isLogin ? "Создать кабинет" : "Уже есть аккаунт? Войти"}</span></p>
                    </form>
                </div>
            </div>
        );
    };

    // контекст для текущего юзера
    const AppRoutes = () => {
        const [authUser, setAuthUser] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(()=>{
            const stored = localStorage.getItem("glambank_current_user");
            if(stored){
                const userData = JSON.parse(stored);
                const fullUser = getUsers().find(u=>u.id === userData.id);
                if(fullUser && !fullUser.isBanned) setAuthUser(fullUser);
                else if(fullUser?.isBanned) { localStorage.removeItem("glambank_current_user"); setAuthUser(null); }
                else setAuthUser(null);
            }
            setLoading(false);
        },[]);

        if(loading) return <div style={{padding:"2rem"}}>Загрузка...</div>;
        if(!authUser) return <LoginRegister setAuthUser={setAuthUser} />;
        const isAdmin = authUser.email === "denisbiletskiy0@gmail.com" && authUser.password === "Retro!22848.lol";
        return <MainApp user={authUser} setAuthUser={setAuthUser} isAdmin={isAdmin} />;
    };

    const MainApp = ({ user, setAuthUser, isAdmin }) => {
        const navigate = useNavigate();
        const [activeTab, setActiveTab] = useState("releases"); // releases, moderation, profile, admin, create
        const [releases, setReleases] = useState([]);
        const [showModal, setShowModal] = useState(null); // {type, data}
        const [emailReqs, setEmailReqs] = useState([]);
        const [profileEdit, setProfileEdit] = useState({ login: user.login, email: user.email, password: "" });
        const [profileMsg, setProfileMsg] = useState("");

        const loadReleases = () => {
            const all = getReleases();
            const userReleases = all.filter(r => r.userId === user.id);
            setReleases(userReleases);
        };
        const refreshAll = () => { loadReleases(); if(isAdmin) setEmailReqs(getEmailReqs()); };

        useEffect(()=>{
            loadReleases();
            if(isAdmin) setEmailReqs(getEmailReqs());
        },[user.id]);

        const handleLogout = () => { localStorage.removeItem("glambank_current_user"); setAuthUser(null); navigate("/login"); };

        // проверка блокировки
        if(user.isBanned){
            return (
                <div style={{display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh", flexDirection:"column", background:"#0A0C12"}}>
                    <div className="card" style={{textAlign:"center"}}>
                        <h2>Ваш кабинет был закрыт</h2>
                        <button className="button-icon" style={{margin:"20px"}} onClick={()=>setShowModal({type:"banReason", data:user.banReason})}>Узнать причину</button>
                    </div>
                    {showModal?.type === "banReason" && <Modal onClose={()=>setShowModal(null)}><p><strong>Причина блокировки:</strong> {showModal.data || "Не указана"}</p></Modal>}
                </div>
            );
        }

        // фильтры для вкладок
        const releasesAll = releases;
        const onModeration = releasesAll.filter(r => r.status === "moderation");
        const otherReleases = releasesAll.filter(r => r.status !== "moderation");

        // Компонент создания релиза
        if(activeTab === "create"){
            return <CreateReleaseView user={user} onSuccess={()=> { setActiveTab("releases"); refreshAll(); }} onCancel={()=>setActiveTab("releases")} />;
        }

        // Админка
        if(isAdmin && (activeTab === "adminReleases" || activeTab === "adminUsers")){
            return <AdminPanel activeTab={activeTab} setActiveTab={setActiveTab} refreshAll={refreshAll} />;
        }

        const renderReleaseCard = (rel, isModView=false) => {
            const showModLabel = isModView;
            return (
                <div className="release-card" key={rel.id}>
                    <div className="release-header">
                        {rel.coverData && <img src={rel.coverData} className="cover-thumb" alt="cover" />}
                        <div className="release-info">
                            <div className="release-title">{rel.releaseName} — {rel.artistName}</div>
                            <div className="release-meta">
                                <span>Дата релиза: {rel.releaseDate || "не указана"}</span>
                                <span>Жанр: {rel.genre}</span>
                                {rel.status === "approved" && rel.upc && <span>UPC: {rel.upc}</span>}
                                {rel.status === "approved" && rel.isrcMod && <span>ISRC: {rel.isrcMod}</span>}
                                {rel.status === "rejected" && <span className="status-badge status-rejected">Отклонён <span className="info-icon" onClick={()=>setShowModal({type:"reason", data:rel.rejectionReason})}>?</span></span>}
                                {rel.status === "moderation" && <span className="status-badge status-moderation">На модерации</span>}
                                {rel.status === "approved" && <span className="status-badge status-approved">Одобрен</span>}
                            </div>
                            {showModLabel && <div className="warning-yellow" style={{marginTop:"8px", width:"fit-content"}}>Модерация</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // компонент профиля с изменением
        const saveProfileChanges = () => {
            if(profileEdit.email !== user.email){
                if(!isRealEmail(profileEdit.email)) return setProfileMsg("Неверный формат почты");
                // запрос на смену почты
                const reqs = getEmailReqs();
                if(reqs.find(r=>r.userId === user.id && r.status === "pending")) return setProfileMsg("Запрос на смену уже отправлен");
                reqs.push({ id: Date.now(), userId: user.id, newEmail: profileEdit.email, status: "pending" });
                saveEmailReqs(reqs);
                setProfileMsg("Запрос на смену почты отправлен модератору");
                setProfileEdit({...profileEdit, email: user.email});
                return;
            }
            if(profileEdit.login !== user.login || profileEdit.password){
                const users = getUsers();
                const idx = users.findIndex(u=>u.id===user.id);
                if(idx!==-1){
                    users[idx].login = profileEdit.login;
                    if(profileEdit.password) users[idx].password = profileEdit.password;
                    saveUsers(users);
                    localStorage.setItem("glambank_current_user", JSON.stringify({ id:user.id, email:user.email, login:profileEdit.login, role:user.role }));
                    setAuthUser(users[idx]);
                    setProfileMsg("Данные обновлены (почта требует подтверждения)");
                }
            }
        };

        return (
            <div className="app-container">
                <div className="sidebar">
                    <div><div className="logo">GlamBank</div><div className="badge-sub">Лейбл переходник</div></div>
                    <div className="nav-menu">
                        <button className={`nav-item ${activeTab === "releases" ? "active" : ""}`} onClick={()=>setActiveTab("releases")}>Все релизы</button>
                        <button className={`nav-item ${activeTab === "moderation" ? "active" : ""}`} onClick={()=>setActiveTab("moderation")}>Модерация</button>
                        <button className="nav-item new-release-btn" onClick={()=>setActiveTab("create")}>➕ Новый релиз</button>
                        <button className={`nav-item ${activeTab === "profile" ? "active" : ""}`} onClick={()=>setActiveTab("profile")}>Профиль</button>
                        <button className="nav-item" onClick={handleLogout}>Выйти</button>
                    </div>
                    <div className="user-profile-side" onClick={()=>setActiveTab("profile")}>
                        <div className="user-avatar-placeholder">{user.login?.charAt(0) || "U"}</div>
                        <div><strong>{user.login}</strong><br/><span style={{fontSize:"12px"}}>{user.email}</span></div>
                    </div>
                </div>
                <div className="main-content">
                    {activeTab === "releases" && (
                        <div>
                            <h2>Все релизы</h2>
                            {otherReleases.length === 0 ? <div className="card">пока нет релизов</div> : 
                                <div className="release-grid">{otherReleases.map(r => renderReleaseCard(r))}</div>}
                        </div>
                    )}
                    {activeTab === "moderation" && (
                        <div><h2>Релизы на модерации</h2>
                            {onModeration.length === 0 ? <div className="card">Нет релизов на проверке</div> :
                                <div>{onModeration.map(r => renderReleaseCard(r, true))}</div>}
                        </div>
                    )}
                    {activeTab === "profile" && (
                        <div className="card">
                            <h3>Редактирование профиля</h3>
                            <div className="form-field"><label>Логин</label><input value={profileEdit.login} onChange={e=>setProfileEdit({...profileEdit, login:e.target.value})} /></div>
                            <div className="form-field"><label>Почта (требует подтверждения админа)</label><input value={profileEdit.email} onChange={e=>setProfileEdit({...profileEdit, email:e.target.value})} /></div>
                            <div className="form-field"><label>Новый пароль (оставьте пустым чтобы не менять)</label><input type="password" onChange={e=>setProfileEdit({...profileEdit, password:e.target.value})} /></div>
                            <button className="btn-primary" onClick={saveProfileChanges}>Сохранить изменения</button>
                            {profileMsg && <div className="error-msg" style={{marginTop:12}}>{profileMsg}</div>}
                        </div>
                    )}
                </div>
                {showModal && <Modal onClose={()=>setShowModal(null)}>{showModal.type === "reason" ? <p><strong>Причина отклонения:</strong> {showModal.data}</p> : <p>{showModal.data}</p>}</Modal>}
            </div>
        );
    };

    const CreateReleaseView = ({ user, onSuccess, onCancel }) => {
        const [step, setStep] = useState("type"); // type or form
        const [releaseType, setReleaseType] = useState("");
        const [formData, setFormData] = useState({
            releaseName:"", artistName:"", version:"", lyricist:"", composer:"", trackType:"Original",
            language:"", genre:"Pop", lyrics:"", explicit:"Нет", isrc:"", year:2026, comment:"",
            coverFile:null, coverData:null, mp3File:null, mp3Name:""
        });
        const [errors, setErrors] = useState({});
        const [submitting, setSubmitting] = useState(false);

        const handleCover = (e) => {
            const file = e.target.files[0];
            if(file){
                const img = new Image();
                img.onload = () => {
                    if((img.width===1400 && img.height===1400) || (img.width===3000 && img.height===3000)){
                        const reader = new FileReader();
                        reader.onloadend = () => setFormData({...formData, coverData: reader.result, coverFile:file});
                        reader.readAsDataURL(file);
                    } else setErrors({...errors, cover:"Размер должен быть 1400x1400 или 3000x3000"});
                };
                img.src = URL.createObjectURL(file);
            }
        };
        const handleMp3 = (e) => {
            const file = e.target.files[0];
            if(file && file.type==="audio/mpeg" && file.size <= 10*1024*1024) setFormData({...formData, mp3File:file, mp3Name:file.name});
            else setErrors({...errors, mp3:"MP3 до 10 МБ"});
        };

        const submitRelease = async () => {
            if(!formData.releaseName || !formData.artistName || !formData.language || !formData.genre || !formData.year || !formData.coverData || !formData.mp3File){
                setErrors({global:"Заполните все обязательные поля, обложку и MP3"});
                return;
            }
            setSubmitting(true);
            const newRelease = {
                id: Date.now().toString(),
                userId: user.id,
                releaseName: formData.releaseName,
                artistName: formData.artistName,
                version: formData.version,
                lyricist: formData.lyricist,
                composer: formData.composer,
                trackType: formData.trackType,
                language: formData.language,
                genre: formData.genre,
                lyrics: formData.lyrics,
                explicit: formData.explicit,
                isrc: formData.isrc,
                year: formData.year,
                commentMod: formData.comment,
                coverData: formData.coverData,
                mp3FileName: formData.mp3Name,
                releaseDate: formData.year,
                status: "moderation",
                createdAt: new Date().toISOString()
            };
            const all = getReleases();
            all.push(newRelease);
            saveReleases(all);
            // Formspree отправка
            const fd = new FormData();
            fd.append("releaseName", formData.releaseName);
            fd.append("artist", formData.artistName);
            fd.append("genre", formData.genre);
            fd.append("year", formData.year);
            fd.append("comment", formData.comment);
            fd.append("userEmail", user.email);
            if(formData.mp3File) fd.append("mp3", formData.mp3File);
            try { await fetch("https://formspree.io/f/mzdywnyq", { method: "POST", body: fd, mode: "no-cors" }); } catch(e){}
            onSuccess();
        };
        if(step === "type"){
            return (
                <div className="card" style={{maxWidth:"500px", margin:"auto"}}>
                    <h3>Выберите тип релиза</h3>
                    <button className="btn-primary" style={{margin:"10px"}} onClick={()=>{setReleaseType("Сингл"); setStep("form");}}>Сингл</button>
                    <button className="btn-primary" onClick={()=>{setReleaseType("Альбом/EP"); setStep("form");}}>Альбом/EP</button>
                    <button className="button-icon" onClick={onCancel}>Отмена</button>
                </div>
            );
        }
        return (
            <div className="card">
                <h3>Новый релиз ({releaseType})</h3>
                <div className="two-column-form">
                    <div className="cover-square" onClick={()=>document.getElementById("coverInput").click()}>
                        {formData.coverData ? <img src={formData.coverData} style={{width:"100%",height:"100%",objectFit:"cover"}} /> : <span>Загрузить обложку <br/>1400x1400 / 3000x3000</span>}
                        <input id="coverInput" type="file" accept="image/*" style={{display:"none"}} onChange={handleCover} />
                    </div>
                    <div className="form-fields">
                        <div className="form-field"><label>Имя релиза*</label><input value={formData.releaseName} onChange={e=>setFormData({...formData, releaseName:e.target.value})} /></div>
                        <div className="form-field"><label>Имя артиста*</label><input value={formData.artistName} onChange={e=>setFormData({...formData, artistName:e.target.value})} /></div>
                        <div className="form-field"><label>Версия (необяз)</label><input value={formData.version} onChange={e=>setFormData({...formData, version:e.target.value})} /></div>
                        <div className="form-field"><label>Автор слов</label><input value={formData.lyricist} onChange={e=>setFormData({...formData, lyricist:e.target.value})} /></div>
                        <div className="form-field"><label>Композитор</label><input value={formData.composer} onChange={e=>setFormData({...formData, composer:e.target.value})} /></div>
                        <div className="form-field"><label>Тип трека</label><select value={formData.trackType} onChange={e=>setFormData({...formData, trackType:e.target.value})}>{TRACK_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                        <div className="form-field"><label>Язык названия трека*</label><input value={formData.language} onChange={e=>setFormData({...formData, language:e.target.value})} /></div>
                        <div className="form-field"><label>Жанр*</label><select value={formData.genre} onChange={e=>setFormData({...formData, genre:e.target.value})}>{GENRES.map(g=><option key={g}>{g}</option>)}</select></div>
                        <div className="form-field"><label>Нецензурная лексика</label><select value={formData.explicit} onChange={e=>setFormData({...formData, explicit:e.target.value})}>{EXPLICIT_OPTS.map(o=><option key={o}>{o}</option>)}</select></div>
                        <div className="form-field"><label>ISRC (если есть)</label><input value={formData.isrc} onChange={e=>setFormData({...formData, isrc:e.target.value})} /></div>
                        <div className="form-field"><label>Год выпуска</label><select value={formData.year} onChange={e=>setFormData({...formData, year:e.target.value})}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></div>
                        <div className="form-field"><label>Текст песни (необяз)</label><textarea rows={2} value={formData.lyrics} onChange={e=>setFormData({...formData, lyrics:e.target.value})} /></div>
                        <div className="form-field"><label>MP3 трек (10мб, только MP3)*</label><input type="file" accept=".mp3" onChange={handleMp3} /><span style={{fontSize:12}}>{formData.mp3Name}</span></div>
                        <div className="form-field"><label>Комментарий модераторам</label><textarea value={formData.comment} onChange={e=>setFormData({...formData, comment:e.target.value})} /></div>
                        {errors.global && <div className="error-msg">{errors.global}</div>}
                        <button className="btn-primary" onClick={submitRelease} disabled={submitting}>Отправить на модерацию</button>
                        <button className="button-icon" onClick={onCancel}>Отмена</button>
                    </div>
                </div>
            </div>
        );
    };

    // Админ панель полноценная
    const AdminPanel = ({ activeTab, setActiveTab, refreshAll }) => {
        const [users, setUsers] = useState(getUsers());
        const [allReleases, setAllReleases] = useState(getReleases());
        const [modal, setModal] = useState(null);
        useEffect(()=>{ setUsers(getUsers()); setAllReleases(getReleases()); },[activeTab]);

        const closeUser = (userId, reason) => {
            const updated = users.map(u=> u.id===userId ? {...u, isBanned:true, banReason:reason} : u);
            saveUsers(updated);
            setUsers(updated);
            setModal(null);
        };
        const moderateRelease = (relId, action, upc="", isrcCode="", rejectReason="") => {
            const rels = [...allReleases];
            const idx = rels.findIndex(r=>r.id===relId);
            if(idx===-1) return;
            if(action==="approve"){
                rels[idx].status = "approved";
                rels[idx].upc = upc;
                rels[idx].isrcMod = isrcCode;
            } else if(action==="reject"){
                rels[idx].status = "rejected";
                rels[idx].rejectionReason = rejectReason;
            }
            saveReleases(rels);
            setAllReleases(rels);
            setModal(null);
            refreshAll();
        };

        return (
            <div className="app-container">
                <div className="sidebar"><div className="logo">GlamBank Admin</div><button className="nav-item" onClick={()=>setActiveTab("adminUsers")}>Все кабинеты</button><button className="nav-item" onClick={()=>setActiveTab("adminReleases")}>Все релизы</button><button className="nav-item" onClick={()=>{localStorage.removeItem("glambank_current_user"); window.location.href="/";}}>Выйти</button></div>
                <div className="main-content">
                    {activeTab === "adminUsers" && <div><h3>Все кабинеты</h3>{users.filter(u=>u.role!=="admin").map(u=><div key={u.id} className="release-card"><div><strong>{u.login}</strong> ({u.email}) — Релизов: {allReleases.filter(r=>r.userId===u.id).length}</div><button className="button-icon" onClick={()=>setModal({type:"banUser", user:u})}>Закрыть кабинет</button></div>)}</div>}
                    {activeTab === "adminReleases" && <div><h3>Все релизы</h3>{allReleases.map(rel=>{
                        const owner = users.find(u=>u.id===rel.userId);
                        return <div key={rel.id} className="release-card"><div><strong>{rel.releaseName}</strong> — {rel.artistName}<br/>Пользователь: {owner?.login || rel.userId}<br/>Статус: {rel.status}</div><div><button className="button-icon" onClick={()=>setModal({type:"approve", rel})}>Принять релиз</button><button className="button-icon" onClick={()=>setModal({type:"reject", rel})}>Отклонить релиз</button></div></div>;
                    })}</div>}
                    {modal && <Modal onClose={()=>setModal(null)}>{modal.type==="banUser" && <><p>Причина блокировки</p><textarea id="banReason" rows={2} style={{width:"100%"}}></textarea><button onClick={()=>closeUser(modal.user.id, document.getElementById("banReason").value)}>Закрыть кабинет</button></>}
                    {modal.type==="approve" && <><p>UPC*</p><input id="upcField" /><p>ISRC*</p><input id="isrcField" /><button onClick={()=>moderateRelease(modal.rel.id, "approve", document.getElementById("upcField").value, document.getElementById("isrcField").value)}>Принять</button></>}
                    {modal.type==="reject" && <><p>Причина отклонения</p><textarea id="rejReason" rows={2}></textarea><button onClick={()=>moderateRelease(modal.rel.id, "reject", "", "", document.getElementById("rejReason").value)}>Отклонить</button></>}</Modal>}
                </div>
            </div>
        );
    };

    const Modal = ({ children, onClose }) => {
        return <div className="modal-overlay" onClick={onClose}><div className="modal-card" onClick={e=>e.stopPropagation()}>{children}<button className="button-icon" onClick={onClose} style={{marginTop:16}}>Закрыть</button></div></div>;
    };

    const root = createRoot(document.getElementById("root"));
    root.render(<BrowserRouter><Routes><Route path="*" element={<AppRoutes />} /></Routes></BrowserRouter>);
</script>
</body>
</html>
