<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamBank | Лейбл переходник</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-body: #0A0A0A;
            --bg-panel: #111111;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border: #222222;
            --border-hover: #333333;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --accent: #FFFFFF;
            --accent-bg: #E5E5E5;
            --danger: #FF3B30;
            --success: #34C759;
            --warning: #FF9500;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow: hidden; font-size: 14px; }
        .hidden { display: none !important; }

        /* Typography */
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; margin-bottom: 16px; }
        .text-sm { font-size: 13px; color: var(--text-muted); }

        /* Layout */
        .app { display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: var(--bg-panel); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-body); position: relative; }

        /* UI Elements */
        input, select, textarea { width: 100%; padding: 14px 16px; margin-bottom: 16px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 14px; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #555; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; font-size: 14px; }
        
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-bg); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--bg-glass); border-color: var(--text-muted); }
        .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.2); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        
        .menu-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 12px 16px; color: var(--text-muted); border-radius: 8px; margin-bottom: 4px; transition: 0.2s; font-weight: 500; }
        .menu-btn:hover { background: var(--bg-glass); color: var(--text-main); }
        .menu-btn.active { background: var(--bg-glass); color: var(--text-main); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; }

        .admin-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; padding-left: 16px; margin: 24px 0 8px 0; }

        /* Cards */
        .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .card:hover { border-color: var(--border-hover); }
        .card-cover { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; background: #222; margin-right: 16px; border: 1px solid var(--border); }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; }
        .badge-mod { background: rgba(255, 149, 0, 0.15); color: var(--warning); }
        .badge-ok { background: rgba(52, 199, 89, 0.15); color: var(--success); }
        .badge-err { background: rgba(255, 59, 48, 0.15); color: var(--danger); }

        /* Custom Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .dialog { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .dialog h3 { margin-bottom: 12px; font-size: 18px; }
        .dialog-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
        
        /* Specific elements */
        .upload-box { width: 100%; max-width: 300px; aspect-ratio: 1; border: 1px dashed var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; padding: 20px; background: var(--bg-glass); position: relative; overflow: hidden; }
        .upload-box:hover { border-color: var(--text-muted); }
        .upload-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .track-list-item { background: #000; border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        /* Audio Player admin */
        audio { height: 36px; border-radius: 4px; outline: none; width: 200px; }
        audio::-webkit-media-controls-panel { background-color: var(--bg-glass); }
        audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: white; }
    </style>
</head>
<body>

    <div id="uiAlert" class="overlay hidden">
        <div class="dialog">
            <h3 id="uiAlertTitle">Сообщение</h3>
            <p id="uiAlertText" class="text-sm" style="color: #ccc; margin-bottom: 24px;"></p>
            <button class="btn-primary" style="width: 100%;" onclick="document.getElementById('uiAlert').classList.add('hidden')">Понятно</button>
        </div>
    </div>

    <div id="uiPrompt" class="overlay hidden">
        <div class="dialog">
            <h3 id="uiPromptTitle">Ввод данных</h3>
            <div id="uiPromptInputs"></div>
            <div class="dialog-actions">
                <button class="btn-outline" onclick="UI.closePrompt()">Отмена</button>
                <button class="btn-primary" id="uiPromptConfirm">Подтвердить</button>
            </div>
        </div>
    </div>

    <div id="uiConfirm" class="overlay hidden">
        <div class="dialog">
            <h3 id="uiConfirmTitle">Подтверждение</h3>
            <div class="dialog-actions">
                <button class="btn-outline" onclick="UI.closeConfirm()">Отмена</button>
                <button class="btn-danger" id="uiConfirmBtn">Удалить</button>
            </div>
        </div>
    </div>

    <div id="adminReleaseModal" class="overlay hidden" style="align-items: flex-start; padding: 40px; overflow-y: auto;">
        <div class="dialog" style="max-width: 700px; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
                <h2>Детали релиза</h2>
                <button class="btn-outline" style="padding: 6px 12px;" onclick="document.getElementById('adminReleaseModal').classList.add('hidden')">Закрыть</button>
            </div>
            
            <div style="display: flex; gap: 24px; margin-bottom: 24px;">
                <div style="width: 200px;">
                    <img id="admRelCover" style="width: 200px; height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px;">
                    <button class="btn-outline" style="width: 100%; font-size: 12px;" id="admCoverDl">Скачать обложку</button>
                </div>
                <div style="flex: 1;" id="admRelInfo"></div>
            </div>

            <h3 style="font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px;">Треклист</h3>
            <div id="admRelTracks" style="display: flex; flex-direction: column; gap: 12px;"></div>
        </div>
    </div>

    <div id="banView" class="overlay hidden" style="background: var(--bg-body);">
        <div style="text-align: center;">
            <h1 style="font-size: 32px; color: var(--danger);">Ваш кабинет был закрыт</h1>
            <button class="btn-outline" onclick="UI.alert('Причина блокировки', currentUser.banReason)" style="margin: 20px 10px;">Узнать причину</button>
            <button class="btn-primary" onclick="logout()" style="margin: 20px 10px;">Выйти</button>
        </div>
    </div>

    <div id="authView" class="overlay" style="background: var(--bg-body);">
        <div class="dialog" style="border: none; background: transparent; max-width: 360px;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h2 style="font-size: 24px; letter-spacing: 1px;">GlamBank</h2>
                <p class="text-sm">Лейбл переходник</p>
            </div>
            
            <div id="regFields" class="hidden"><input type="text" id="regLogin" placeholder="Логин"></div>
            <input type="email" id="authEmail" placeholder="Почта">
            <input type="password" id="authPassword" placeholder="Пароль">
            
            <button class="btn-primary" id="mainAuthBtn" style="width: 100%; margin-top: 8px;" onclick="processAuth()">Войти в кабинет</button>
            <button class="btn-outline" style="width: 100%; margin-top: 12px; border: none;" onclick="toggleAuthMode()" id="switchAuthBtn">Создать кабинет</button>
        </div>
    </div>

    <div id="appView" class="app hidden">
        <div class="sidebar">
            <div style="margin-bottom: 40px; padding-left: 16px;">
                <h2 style="font-size: 18px; font-weight: 600;">GlamBank</h2>
            </div>

            <button class="menu-btn" style="background: #fff; color: #000; margin-bottom: 24px; text-align: center;" onclick="startNewRelease()">+ Новый релиз</button>
            
            <button class="menu-btn active" onclick="nav('overview')">Обзор</button>
            <button class="menu-btn" onclick="nav('overview')">Ваша музыка</button>

            <div id="adminPanel" class="hidden">
                <div class="admin-label">Управление</div>
                <button class="menu-btn" onclick="nav('adminUsers')">Кабинеты</button>
                <button class="menu-btn" onclick="nav('adminReleases')">Все релизы</button>
                <button class="menu-btn" onclick="nav('adminDeleted')">Удалённые</button>
            </div>

            <div style="margin-top: auto;">
                <div style="padding: 16px; margin-bottom: 12px; background: #000; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
                    <span id="userNameDisplay" style="font-weight: 500;">Профиль</span>
                    <button class="btn-outline" style="padding: 4px 8px; font-size: 12px; border: none;" onclick="editProfile()">⚙️</button>
                </div>
                <button class="menu-btn" style="color: var(--danger);" onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="content">
            <h1 id="pageTitle">Обзор</h1>

            <div id="sec-overview" class="view-section">
                <div id="userReleasesList"></div>
            </div>

            <div id="sec-newRelease" class="view-section hidden">
                <div style="display: flex; gap: 40px; max-width: 900px;">
                    <div style="flex: 1;">
                        <h3>Основная информация</h3>
                        <p class="text-sm" style="margin-bottom: 20px;">Заполните данные для всего релиза</p>
                        
                        <select id="r_type" onchange="toggleReleaseType()">
                            <option value="">Выберите формат</option>
                            <option value="Сингл">Сингл (1 трек)</option>
                            <option value="Альбом/EP">Альбом/EP (от 2 треков)</option>
                        </select>
                        <input type="text" id="r_title" placeholder="Название релиза">
                        <input type="text" id="r_artist" placeholder="Основной артист">
                        
                        <div style="display: flex; gap: 16px;">
                            <select id="r_genre">
                                <option value="">Жанр</option>
                                <option value="Pop">Pop</option><option value="Hip Hop/Rap">Hip Hop/Rap</option>
                                <option value="Rock">Rock</option><option value="Electronic">Electronic</option>
                                <option value="R&B">R&B</option><option value="Alternative">Alternative</option>
                            </select>
                            <select id="r_year"></select>
                        </div>
                        <textarea id="r_comment" placeholder="Комментарий для модераторов (необязательно)" rows="2"></textarea>
                    </div>

                    <div style="width: 300px;">
                        <div class="upload-box" onclick="document.getElementById('r_cover').click()">
                            <span id="coverHint" class="text-sm">Обложка<br>1400x1400 / 3000x3000</span>
                            <img id="coverPreview" class="upload-img hidden">
                            <input type="file" id="r_cover" accept="image/*" class="hidden" onchange="handleCoverUpload(this)">
                        </div>
                    </div>
                </div>

                <div id="tracklistArea" class="hidden" style="margin-top: 40px; max-width: 900px; border-top: 1px solid var(--border); padding-top: 32px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3>Треклист</h3>
                        <button class="btn-outline" style="font-size: 12px; padding: 6px 12px;" onclick="document.getElementById('addAudioFile').click()">+ Добавить аудиофайл</button>
                        <input type="file" id="addAudioFile" accept=".mp3" class="hidden" multiple onchange="addTracks(this)">
                    </div>
                    <div id="draftTracksList"></div>
                    <button class="btn-primary" style="width: 100%; margin-top: 24px; padding: 16px;" onclick="submitFinalRelease()">Отправить релиз на модерацию</button>
                </div>
            </div>

            <div id="sec-trackEdit" class="view-section hidden" style="max-width: 600px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2>Редактирование трека</h2>
                    <span id="te_filename" class="text-sm"></span>
                </div>

                <input type="text" id="t_title" placeholder="Название трека">
                <input type="text" id="t_artist" placeholder="Артисты трека">
                <input type="text" id="t_version" placeholder="Версия (необязательно)">
                
                <div style="display: flex; gap: 16px;">
                    <input type="text" id="t_author" placeholder="Автор слов">
                    <input type="text" id="t_comp" placeholder="Композитор">
                </div>
                
                <div style="display: flex; gap: 16px;">
                    <select id="t_type">
                        <option value="Original">Original</option><option value="Cover">Cover</option>
                        <option value="Remix">Remix</option><option value="Karaoke">Karaoke</option>
                    </select>
                    <input type="text" id="t_lang" placeholder="Язык">
                </div>

                <textarea id="t_lyrics" placeholder="Текст песни (необязательно)" rows="3"></textarea>
                
                <div style="display: flex; gap: 16px;">
                    <select id="t_explicit"><option value="Нет">Мат: Нет</option><option value="Да">Мат: Да</option></select>
                    <input type="text" id="t_isrc" placeholder="ISRC (если есть)">
                </div>

                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button class="btn-primary" style="flex: 1;" onclick="saveTrackEdit()">Сохранить и вернуться</button>
                    <button class="btn-outline" onclick="cancelTrackEdit()">Отмена</button>
                </div>
            </div>

            <div id="sec-adminUsers" class="view-section hidden"><div id="adminUsersList"></div></div>
            <div id="sec-adminReleases" class="view-section hidden"><div id="adminReleasesList"></div></div>
            <div id="sec-adminDeleted" class="view-section hidden"><div id="adminDeletedList"></div></div>
        </div>
    </div>

<script>
    const ADMIN_EMAIL = 'denisbiletskiy0@gmail.com';
    const FORMSPREE = 'https://formspree.io/f/mzdywnyq';

    // --- СИСТЕМА КАСТОМНЫХ ОКОН (UI) ---
    class UI {
        static alert(title, text) {
            document.getElementById('uiAlertTitle').innerText = title;
            document.getElementById('uiAlertText').innerText = text;
            document.getElementById('uiAlert').classList.remove('hidden');
        }
        static prompt(title, fields, onConfirm) {
            // fields: [{id: 'f1', placeholder: 'UPC'}, ...]
            document.getElementById('uiPromptTitle').innerText = title;
            const container = document.getElementById('uiPromptInputs');
            container.innerHTML = fields.map(f => `<input type="text" id="prompt_${f.id}" placeholder="${f.placeholder}">`).join('');
            document.getElementById('uiPrompt').classList.remove('hidden');
            document.getElementById('uiPromptConfirm').onclick = () => {
                const results = {};
                fields.forEach(f => results[f.id] = document.getElementById(`prompt_${f.id}`).value);
                this.closePrompt();
                onConfirm(results);
            };
        }
        static closePrompt() { document.getElementById('uiPrompt').classList.add('hidden'); }
        
        static confirm(title, onConfirm) {
            document.getElementById('uiConfirmTitle').innerText = title;
            document.getElementById('uiConfirm').classList.remove('hidden');
            document.getElementById('uiConfirmBtn').onclick = () => { this.closeConfirm(); onConfirm(); };
        }
        static closeConfirm() { document.getElementById('uiConfirm').classList.add('hidden'); }
    }

    // --- INDEXED DB (Для поддержки файлов > 5МБ) ---
    const dbName = "GlamBank_DB";
    let idb;

    function initDB() {
        return new Promise((resolve, reject) => {
            let request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = (e) => {
                let db = e.target.result;
                if(!db.objectStoreNames.contains('data')) db.createObjectStore('data');
            };
            request.onsuccess = (e) => { idb = e.target.result; resolve(); };
            request.onerror = (e) => reject(e);
        });
    }
    
    function getDB() {
        return new Promise(resolve => {
            let tx = idb.transaction('data', 'readonly');
            let req = tx.objectStore('data').get('state');
            req.onsuccess = () => resolve(req.result || { users: [], releases: [] });
            req.onerror = () => resolve({ users: [], releases: [] });
        });
    }

    function saveDB(state) {
        return new Promise(resolve => {
            let tx = idb.transaction('data', 'readwrite');
            let req = tx.objectStore('data').put(state, 'state');
            req.onsuccess = () => resolve();
        });
    }

    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
    let appState = { users: [], releases: [] };
    let currentUser = null;
    let authMode = 'login';
    
    // Черновик текущего создаваемого релиза
    let draftRelease = { cover: null, tracks: [] };
    let editTrackId = null;

    // Заполнение годов
    const yBox = document.getElementById('r_year');
    for(let y=2026; y>=2000; y--) yBox.innerHTML += `<option value="${y}">${y}</option>`;

    // --- ЗАПУСК ---
    window.onload = async () => {
        try {
            await initDB();
            appState = await getDB();
        } catch(e) {
            UI.alert("Ошибка", "Браузер не поддерживает локальную базу. Приложение может работать нестабильно.");
        }
    };

    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'reg' : 'login';
        document.getElementById('regFields').classList.toggle('hidden', authMode === 'login');
        document.getElementById('mainAuthBtn').innerText = authMode === 'login' ? 'Войти в кабинет' : 'Создать кабинет';
        document.getElementById('switchAuthBtn').innerText = authMode === 'login' ? 'Создать кабинет' : 'Уже есть аккаунт';
    }

    async function processAuth() {
        const email = document.getElementById('authEmail').value.toLowerCase().trim();
        const pass = document.getElementById('authPassword').value;
        const login = document.getElementById('regLogin').value;

        if(!email.includes('@') || !pass) return UI.alert("Ошибка", "Заполните почту и пароль");

        if(authMode === 'login') {
            if(email === ADMIN_EMAIL && pass === 'Retro!22848.lol') {
                currentUser = { email: ADMIN_EMAIL, login: 'Администратор', id: 'admin' };
                startApp();
            } else {
                const u = appState.users.find(x => x.email === email && x.pass === pass);
                if(u) { currentUser = u; startApp(); }
                else UI.alert("Ошибка", "Неверная почта или пароль");
            }
        } else {
            if(!login) return UI.alert("Ошибка", "Укажите логин");
            if(appState.users.find(x => x.email === email)) return UI.alert("Ошибка", "Почта занята");
            const newUser = { id: Date.now().toString(), email, pass, login, isBanned: false, banReason: '' };
            appState.users.push(newUser);
            await saveDB(appState);
            currentUser = newUser;
            startApp();
        }
    }

    function startApp() {
        if(currentUser.isBanned) {
            document.getElementById('banView').classList.remove('hidden');
            document.getElementById('authView').classList.add('hidden');
            return;
        }
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userNameDisplay').innerText = currentUser.login;
        
        if(currentUser.email === ADMIN_EMAIL) document.getElementById('adminPanel').classList.remove('hidden');
        nav('overview');
    }

    function logout() { location.reload(); }

    function editProfile() {
        if(currentUser.id === 'admin') return;
        UI.prompt("Изменение профиля", [
            {id: 'l', placeholder: 'Новый логин (сейчас: '+currentUser.login+')'},
            {id: 'p', placeholder: 'Новый пароль (оставьте пустым для отмены)'}
        ], async (data) => {
            if(data.l) currentUser.login = data.l;
            if(data.p) currentUser.pass = data.p;
            await saveDB(appState);
            document.getElementById('userNameDisplay').innerText = currentUser.login;
            UI.alert("Успешно", "Данные профиля обновлены");
        });
    }

    function nav(section) {
        if(currentUser.isBanned) return;
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + section).classList.remove('hidden');
        
        document.querySelectorAll('.sidebar .menu-btn').forEach(b => b.classList.remove('active'));
        event.target.classList?.add('active');

        const titles = { 'overview': 'Ваши релизы', 'newRelease': 'Новый релиз', 'adminUsers': 'Кабинеты', 'adminReleases': 'Релизы на модерации', 'adminDeleted': 'Удаленные релизы' };
        document.getElementById('pageTitle').innerText = titles[section] || 'Раздел';

        if(section === 'overview') renderUserReleases();
        if(section === 'adminUsers') renderAdminUsers();
        if(section === 'adminReleases') renderAdminReleases(false);
        if(section === 'adminDeleted') renderAdminReleases(true);
    }

    // --- ЛОГИКА СОЗДАНИЯ РЕЛИЗА ---
    function startNewRelease() {
        draftRelease = { cover: null, tracks: [] };
        document.getElementById('r_type').value = '';
        document.getElementById('r_title').value = '';
        document.getElementById('r_artist').value = currentUser.login;
        document.getElementById('r_genre').value = '';
        document.getElementById('coverPreview').classList.add('hidden');
        document.getElementById('coverHint').classList.remove('hidden');
        toggleReleaseType();
        nav('newRelease');
    }

    function handleCoverUpload(input) {
        const file = input.files[0];
        if(!file) return;
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
            if((img.width === 1400 || img.width === 3000) && img.width === img.height) {
                draftRelease.cover = file; // Сохраняем сам файл (Blob)
                document.getElementById('coverPreview').src = img.src;
                document.getElementById('coverPreview').classList.remove('hidden');
                document.getElementById('coverHint').classList.add('hidden');
            } else {
                UI.alert("Ошибка обложки", "Размер должен быть строго 1400x1400 или 3000x3000 px");
                input.value = "";
            }
        };
    }

    function toggleReleaseType() {
        const type = document.getElementById('r_type').value;
        if(type) {
            document.getElementById('tracklistArea').classList.remove('hidden');
        } else {
            document.getElementById('tracklistArea').classList.add('hidden');
        }
    }

    function addTracks(input) {
        const files = Array.from(input.files);
        if(!files.length) return;
        
        files.forEach(file => {
            if(file.size > 10 * 1024 * 1024) {
                UI.alert("Ошибка файла", `Файл ${file.name} превышает 10МБ`);
                return;
            }
            draftRelease.tracks.push({
                id: Date.now() + Math.random(),
                filename: file.name,
                audioFile: file, // Сохраняем File/Blob объект
                title: file.name.replace('.mp3', ''),
                artist: document.getElementById('r_artist').value || '',
                version: '', author: '', comp: '', type: 'Original', lang: '', lyrics: '', explicit: 'Нет', isrc: ''
            });
        });
        input.value = "";
        renderDraftTracks();
    }

    function renderDraftTracks() {
        const box = document.getElementById('draftTracksList');
        box.innerHTML = draftRelease.tracks.map((t, idx) => `
            <div class="track-list-item">
                <div>
                    <div style="font-weight: 500;">${idx+1}. ${t.title}</div>
                    <div class="text-sm">${t.filename}</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-outline" style="padding: 6px 12px; font-size: 12px;" onclick="openTrackEdit(${t.id})">Редактировать</button>
                    <button class="btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="removeDraftTrack(${t.id})">Удалить</button>
                </div>
            </div>
        `).join('');
    }

    function removeDraftTrack(id) {
        draftRelease.tracks = draftRelease.tracks.filter(t => t.id !== id);
        renderDraftTracks();
    }

    function openTrackEdit(id) {
        const t = draftRelease.tracks.find(x => x.id === id);
        editTrackId = id;
        document.getElementById('te_filename').innerText = t.filename;
        document.getElementById('t_title').value = t.title;
        document.getElementById('t_artist').value = t.artist;
        document.getElementById('t_version').value = t.version;
        document.getElementById('t_author').value = t.author;
        document.getElementById('t_comp').value = t.comp;
        document.getElementById('t_type').value = t.type;
        document.getElementById('t_lang').value = t.lang;
        document.getElementById('t_lyrics').value = t.lyrics;
        document.getElementById('t_explicit').value = t.explicit;
        document.getElementById('t_isrc').value = t.isrc;
        
        document.getElementById('sec-newRelease').classList.add('hidden');
        document.getElementById('sec-trackEdit').classList.remove('hidden');
    }

    function saveTrackEdit() {
        const t = draftRelease.tracks.find(x => x.id === editTrackId);
        t.title = document.getElementById('t_title').value;
        t.artist = document.getElementById('t_artist').value;
        t.version = document.getElementById('t_version').value;
        t.author = document.getElementById('t_author').value;
        t.comp = document.getElementById('t_comp').value;
        t.type = document.getElementById('t_type').value;
        t.lang = document.getElementById('t_lang').value;
        t.lyrics = document.getElementById('t_lyrics').value;
        t.explicit = document.getElementById('t_explicit').value;
        t.isrc = document.getElementById('t_isrc').value;
        
        cancelTrackEdit();
        renderDraftTracks();
    }

    function cancelTrackEdit() {
        document.getElementById('sec-trackEdit').classList.add('hidden');
        document.getElementById('sec-newRelease').classList.remove('hidden');
        editTrackId = null;
    }

    async function submitFinalRelease() {
        const type = document.getElementById('r_type').value;
        const title = document.getElementById('r_title').value;
        const artist = document.getElementById('r_artist').value;
        const genre = document.getElementById('r_genre').value;
        const year = document.getElementById('r_year').value;
        const comment = document.getElementById('r_comment').value;

        if(!title || !artist || !genre || !type) return UI.alert("Ошибка", "Заполните все основные поля релиза");
        if(!draftRelease.cover) return UI.alert("Ошибка", "Прикрепите обложку");
        if(draftRelease.tracks.length === 0) return UI.alert("Ошибка", "Добавьте минимум один трек");
        if(type === 'Сингл' && draftRelease.tracks.length > 1) return UI.alert("Ошибка", "Сингл не может содержать больше 1 трека");
        if(type === 'Альбом/EP' && draftRelease.tracks.length < 2) return UI.alert("Ошибка", "Альбом должен содержать минимум 2 трека");

        const newRelease = {
            id: Date.now().toString(),
            userId: currentUser.id,
            userEmail: currentUser.email,
            type, title, artist, genre, year, comment,
            status: 'Модерация',
            date: new Date().toLocaleDateString(),
            coverFile: draftRelease.cover, // BLOB
            tracks: draftRelease.tracks, // Массив с BLOB внутри
            isDeleted: false,
            upc: '', adminIsrc: ''
        };

        appState.releases.push(newRelease);
        await saveDB(appState);

        // Отправка уведомления на Formspree (отправляем только текст, файлы нельзя без formData)
        fetch(FORMSPREE, {
            method: 'POST',
            body: JSON.stringify({ event: 'Новый релиз загружен', artist, title, tracksCount: draftRelease.tracks.length, userEmail: currentUser.email }),
            headers: {'Content-Type': 'application/json', 'Accept': 'application/json'}
        });

        UI.alert("Успешно!", "Релиз отправлен на модерацию и сохранен в базе.");
        nav('overview');
    }

    // --- ОТОБРАЖЕНИЕ СПИСКОВ ---
    function renderCard(r, isAdmin) {
        let status = r.status === 'Модерация' ? '<span class="badge badge-mod">Модерация</span>' : 
                     r.status === 'Одобрен' ? '<span class="badge badge-ok">Одобрен</span>' : 
                     `<span class="badge badge-err" style="cursor:pointer" onclick="UI.alert('Отклонен', '${r.rejectReason}')">Отклонен ⓘ</span>`;
        if(r.isDeleted) status = '<span class="badge badge-err">Удален</span>';

        const coverSrc = r.coverFile ? URL.createObjectURL(r.coverFile) : '';

        let adminBtns = '';
        if(isAdmin && !r.isDeleted) {
            adminBtns = `
                <button class="btn-outline" style="padding: 6px 10px; font-size: 12px; margin-right: 8px;" onclick="viewReleaseAdmin('${r.id}')">Подробнее</button>
                ${r.status === 'Модерация' ? `
                    <button class="btn-outline" style="padding: 6px; border-color: var(--success); color: var(--success);" onclick="admApprove('${r.id}')">✓</button>
                    <button class="btn-outline" style="padding: 6px; border-color: var(--danger); color: var(--danger);" onclick="admReject('${r.id}')">✗</button>
                ` : ''}
                <button class="btn-danger" style="padding: 6px 10px; font-size: 12px; margin-left: 8px;" onclick="admDelete('${r.id}')">Удалить</button>
            `;
        } else if (isAdmin && r.isDeleted) {
            adminBtns = `<button class="btn-outline" style="padding: 6px 10px; font-size: 12px;" onclick="viewReleaseAdmin('${r.id}')">Просмотр</button>`;
        }

        return `
            <div class="card">
                <div style="display: flex; align-items: center; flex: 1;">
                    <img src="${coverSrc}" class="card-cover">
                    <div>
                        <div style="font-weight: 600; font-size: 16px;">${r.title} <span style="font-weight: normal; color: var(--text-muted); font-size: 14px;">— ${r.type}</span></div>
                        <div class="text-sm" style="margin-top: 4px;">${r.artist} • ${r.tracks.length} трек(ов) ${isAdmin ? `• От: ${r.userEmail}` : ''}</div>
                        ${r.upc ? `<div class="text-sm" style="color: var(--success); margin-top: 4px;">UPC: ${r.upc}</div>` : ''}
                    </div>
                </div>
                <div style="display: flex; align-items: center;">
                    ${status}
                    ${adminBtns ? `<div style="margin-left: 16px; border-left: 1px solid var(--border); padding-left: 16px; display:flex;">${adminBtns}</div>` : ''}
                </div>
            </div>
        `;
    }

    function renderUserReleases() {
        const list = appState.releases.filter(r => r.userEmail === currentUser.email && !r.isDeleted);
        document.getElementById('userReleasesList').innerHTML = list.length ? list.map(r => renderCard(r, false)).reverse().join('') : '<p class="text-sm">Нет релизов</p>';
    }

    function renderAdminUsers() {
        document.getElementById('adminUsersList').innerHTML = appState.users.map(u => `
            <div class="card">
                <div><div style="font-weight: 600;">${u.login}</div><div class="text-sm">${u.email}</div></div>
                <button class="btn-outline" style="color: ${u.isBanned?'var(--success)':'var(--danger)'}" onclick="toggleBan('${u.id}')">${u.isBanned?'Разбанить':'Закрыть кабинет'}</button>
            </div>
        `).join('');
    }

    function renderAdminReleases(showDeleted) {
        const list = appState.releases.filter(r => r.isDeleted === showDeleted);
        document.getElementById(showDeleted ? 'adminDeletedList' : 'adminReleasesList').innerHTML = list.length ? list.map(r => renderCard(r, true)).reverse().join('') : '<p class="text-sm">Список пуст</p>';
    }

    // --- ФУНКЦИИ АДМИНА ---
    async function toggleBan(id) {
        const u = appState.users.find(x => x.id === id);
        if(u.isBanned) {
            u.isBanned = false; u.banReason = ''; await saveDB(appState); renderAdminUsers();
        } else {
            UI.prompt("Блокировка", [{id: 'r', placeholder: 'Причина закрытия'}], async (res) => {
                u.isBanned = true; u.banReason = res.r || 'Нарушение правил'; await saveDB(appState); renderAdminUsers();
            });
        }
    }

    function admApprove(id) {
        UI.prompt("Принять релиз", [{id:'upc', placeholder:'Вставьте UPC'}, {id:'isrc', placeholder:'Вставьте ISRC (для сингла)'}], async (res) => {
            const r = appState.releases.find(x => x.id === id);
            r.status = 'Одобрен'; r.upc = res.upc; r.adminIsrc = res.isrc;
            await saveDB(appState); renderAdminReleases(false);
        });
    }

    function admReject(id) {
        UI.prompt("Отклонить релиз", [{id:'reason', placeholder:'Причина отклонения'}], async (res) => {
            const r = appState.releases.find(x => x.id === id);
            r.status = 'Отклонён'; r.rejectReason = res.reason || 'Не соответствует требованиям';
            await saveDB(appState); renderAdminReleases(false);
        });
    }

    function admDelete(id) {
        UI.confirm("Перенести релиз в удаленные?", async () => {
            appState.releases.find(x => x.id === id).isDeleted = true;
            await saveDB(appState); renderAdminReleases(false);
        });
    }

    function viewReleaseAdmin(id) {
        const r = appState.releases.find(x => x.id === id);
        const coverUrl = URL.createObjectURL(r.coverFile);
        
        document.getElementById('admRelCover').src = coverUrl;
        document.getElementById('admCoverDl').onclick = () => {
            const a = document.createElement('a'); a.href = coverUrl; a.download = `${r.artist} - ${r.title}_cover.jpg`; a.click();
        };

        document.getElementById('admRelInfo').innerHTML = `
            <div style="font-size: 20px; font-weight: bold;">${r.title}</div>
            <div style="color: var(--text-muted); margin-bottom: 12px;">${r.artist}</div>
            <div class="text-sm">Жанр: ${r.genre} | Год: ${r.year}</div>
            <div class="text-sm">Формат: ${r.type} | Дата загрузки: ${r.date}</div>
            ${r.comment ? `<div style="margin-top:12px; padding:8px; background:var(--bg-glass); border-radius:6px; font-size:12px;">Комментарий: ${r.comment}</div>` : ''}
        `;

        document.getElementById('admRelTracks').innerHTML = r.tracks.map((t, i) => {
            const audioUrl = URL.createObjectURL(t.audioFile);
            return `
            <div style="background: var(--bg-glass); border: 1px solid var(--border); padding: 12px; border-radius: 8px;">
                <div style="font-weight: 500; margin-bottom: 8px;">${i+1}. ${t.title} ${t.version ? `(${t.version})` : ''}</div>
                <div class="text-sm" style="margin-bottom: 12px;">Артисты: ${t.artist} | Автор: ${t.author} | ISRC: ${t.isrc}</div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <audio controls src="${audioUrl}"></audio>
                    <a href="${audioUrl}" download="${t.title}.mp3" style="color: var(--accent); font-size: 12px; text-decoration: none;">Скачать MP3</a>
                </div>
            </div>`;
        }).join('');

        document.getElementById('adminReleaseModal').classList.remove('hidden');
    }
</script>
</body>
</html>
