<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamBank | Лейбл переходник</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root { --bg-body: #0A0A0A; --bg-panel: #111111; --bg-glass: rgba(255, 255, 255, 0.03); --border: #222222; --border-hover: #333333; --text-main: #FFFFFF; --text-muted: #888888; --accent: #FFFFFF; --accent-bg: #E5E5E5; --danger: #FF3B30; --success: #34C759; --warning: #FF9500; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow: hidden; font-size: 14px; }
        .hidden { display: none !important; }

        h1 { font-size: 28px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; margin-bottom: 16px; }
        .text-sm { font-size: 13px; color: var(--text-muted); }
        .req-star { color: var(--danger); margin-left: 4px; font-weight: bold; }

        .app { display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: var(--bg-panel); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-body); position: relative; }

        .form-group { margin-bottom: 16px; width: 100%; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 14px 16px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 14px; transition: 0.2s; }
        input[type="date"] { color-scheme: dark; }
        input:focus, select:focus, textarea:focus { border-color: #555; outline: none; }
        .error-field { border-color: var(--danger) !important; box-shadow: 0 0 0 1px var(--danger); }

        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-bg); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--bg-glass); border-color: var(--text-muted); }
        .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.2); }
        .btn-success { background: rgba(52, 199, 89, 0.1); color: var(--success); border: 1px solid rgba(52, 199, 89, 0.2); }
        
        .menu-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 12px 16px; color: var(--text-muted); border-radius: 8px; margin-bottom: 4px; transition: 0.2s; font-weight: 500; }
        .menu-btn:hover, .menu-btn.active { background: var(--bg-glass); color: var(--text-main); }
        .menu-btn.active { border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; }
        .admin-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; padding-left: 16px; margin: 24px 0 8px 0; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 24px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px 24px; border-radius: var(--radius); text-align: center; }
        .stat-num { font-size: 40px; font-weight: 700; margin-bottom: 8px; }
        .stat-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }

        .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .card-cover { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; background: #222; margin-right: 16px; border: 1px solid var(--border); }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; }
        .badge-mod { background: rgba(255, 149, 0, 0.15); color: var(--warning); }
        .badge-ok { background: rgba(52, 199, 89, 0.15); color: var(--success); }
        .badge-err { background: rgba(255, 59, 48, 0.15); color: var(--danger); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .dialog { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; }
        .upload-box { width: 100%; max-width: 300px; aspect-ratio: 1; border: 1px dashed var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; padding: 20px; background: var(--bg-glass); position: relative; overflow: hidden; }
        .upload-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* CHAT SYSTEM */
        .chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 160px); max-width: 800px; background: #000; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: relative; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .chat-input-area { display: flex; padding: 16px; border-top: 1px solid var(--border); background: var(--bg-panel); gap: 12px; align-items: center; }
        .chat-input-area input { margin-bottom: 0; flex: 1; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .msg-me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-them { background: var(--bg-glass); color: #fff; align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 6px; text-align: right; }
        .admin-chat-layout { display: flex; height: calc(100vh - 160px); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .admin-chat-users { width: 300px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .admin-chat-user { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .admin-chat-user:hover, .admin-chat-user.active { background: var(--bg-glass); }
        .admin-chat-user.active { border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div id="uiAlert" class="overlay hidden"><div class="dialog"><h3 id="uiAlertTitle">Сообщение</h3><p id="uiAlertText" class="text-sm" style="color: #ccc; margin-bottom: 24px;"></p><button class="btn-primary" style="width: 100%;" onclick="document.getElementById('uiAlert').classList.add('hidden')">Понятно</button></div></div>
    
    <div id="adminReleaseModal" class="overlay hidden" style="align-items: flex-start; padding: 40px; overflow-y: auto;">
        <div class="dialog" style="max-width: 750px; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;"><h2>Детали релиза</h2><button class="btn-outline" style="padding: 6px 12px;" onclick="document.getElementById('adminReleaseModal').classList.add('hidden')">Закрыть</button></div>
            <div style="display: flex; gap: 24px; margin-bottom: 32px;">
                <div style="width: 220px;"><img id="admRelCover" style="width: 220px; height: 220px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px;"></div>
                <div style="flex: 1;" id="admRelInfo"></div>
            </div>
        </div>
    </div>

    <div id="authView" class="overlay" style="background: var(--bg-body);">
        <div class="dialog" style="border: none; background: transparent; max-width: 360px;">
            <div style="text-align: center; margin-bottom: 40px;"><h2 style="font-size: 24px; letter-spacing: 1px;">GlamBank</h2><p class="text-sm">Лейбл переходник</p></div>
            <div id="regFields" class="hidden"><div class="form-group"><input type="text" id="regLogin" placeholder="Логин артиста"></div></div>
            <div class="form-group"><input type="email" id="authEmail" placeholder="Почта"></div>
            <div class="form-group"><input type="password" id="authPassword" placeholder="Пароль"></div>
            <button class="btn-primary" id="mainAuthBtn" style="width: 100%; margin-top: 8px;" onclick="processAuth()">Войти в кабинет</button>
            <button class="btn-outline" style="width: 100%; margin-top: 12px; border: none;" onclick="toggleAuthMode()" id="switchAuthBtn">Создать кабинет</button>
        </div>
    </div>

    <div id="appView" class="app hidden">
        <div class="sidebar">
            <div style="margin-bottom: 40px; padding-left: 16px;"><h2 style="font-size: 18px; font-weight: 600;">GlamBank</h2></div>
            <button class="menu-btn" style="background: #fff; color: #000; margin-bottom: 24px; text-align: center;" onclick="nav('newRelease')">+ Новый релиз</button>
            <button class="menu-btn active" onclick="nav('overview')">Обзор</button>
            <button class="menu-btn" onclick="nav('yourMusic')">Ваша музыка</button>
            
            <div id="userSupportBtn" class="hidden">
                <div class="admin-label" style="margin-top: 16px;">Поддержка</div>
                <button class="menu-btn" onclick="nav('userChat')">Связь с модератором</button>
            </div>

            <div id="adminPanel" class="hidden">
                <div class="admin-label">Управление</div>
                <button class="menu-btn" onclick="nav('adminChats')">Сообщения артистов</button>
                <button class="menu-btn" onclick="nav('adminUsers')">Кабинеты</button>
                <button class="menu-btn" onclick="nav('adminReleases')">Все релизы</button>
            </div>

            <div style="margin-top: auto;">
                <div style="padding: 16px; margin-bottom: 12px; background: #000; border-radius: 8px; border: 1px solid var(--border);">
                    <span id="userNameDisplay" style="font-weight: 500; font-size: 13px;">Профиль</span>
                </div>
                <button class="menu-btn" style="color: var(--danger);" onclick="location.reload()">Выйти</button>
            </div>
        </div>

        <div class="content">
            <h1 id="pageTitle">Обзор</h1>

            <div id="sec-overview" class="view-section">
                <p class="text-sm" id="overviewDesc">Статистика по релизам</p>
                <div class="stat-grid" id="dashboardStats"></div>
            </div>

            <div id="sec-yourMusic" class="view-section hidden">
                <div id="userReleasesList"></div>
            </div>

            <div id="sec-userChat" class="view-section hidden">
                <p class="text-sm" style="margin-bottom: 16px;">Здесь вы можете задать вопросы администрации или обсудить ваш релиз.</p>
                <div class="chat-wrap">
                    <div id="userChatBox" class="chat-msgs"></div>
                    <div class="chat-input-area">
                        <input type="text" id="userChatInput" placeholder="Напишите сообщение..." autocomplete="off">
                        <button class="btn-primary" onclick="sendMessage('user')">Отправить</button>
                    </div>
                </div>
            </div>

            <div id="sec-adminChats" class="view-section hidden">
                <div class="admin-chat-layout">
                    <div class="admin-chat-users" id="adminChatUserList" style="flex: 1; overflow-y: auto;"></div>
                    <div style="flex: 1; display: flex; flex-direction: column; background: #000;">
                        <div id="adminChatBox" class="chat-msgs" style="flex: 1;">
                            <div class="empty-state"><h2>Выберите диалог</h2><p class="text-sm">Выберите артиста слева</p></div>
                        </div>
                        <div class="chat-input-area hidden" id="adminChatInputArea">
                            <input type="text" id="adminChatInput" placeholder="Ответить артисту..." autocomplete="off">
                            <button class="btn-primary" onclick="sendMessage('admin')">Отправить</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-newRelease" class="view-section hidden">
                <div style="display: flex; gap: 40px; max-width: 900px;">
                    <div style="flex: 1;">
                        <h3>Основная информация</h3>
                        <div class="form-group"><label>Формат релиза <span class="req-star">*</span></label><select id="r_type"><option value="Сингл">Сингл (1 трек)</option><option value="Альбом/EP">Альбом/EP (от 2 треков)</option></select></div>
                        <div class="form-group"><label>Название релиза <span class="req-star">*</span></label><input type="text" id="r_title" placeholder="Название"></div>
                        <div class="form-group"><label>Основной артист <span class="req-star">*</span></label><input type="text" id="r_artist" placeholder="Артист"></div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group"><label>Жанр</label><select id="r_genre"><option value="Pop">Pop</option><option value="Hip Hop/Rap">Hip Hop/Rap</option><option value="Rock">Rock</option><option value="Electronic">Electronic</option></select></div>
                            <div class="form-group"><label>Год</label><select id="r_year"><option value="2026">2026</option><option value="2025">2025</option></select></div>
                        </div>
                        <div class="form-group"><label>Штрихкод (UPC)</label><input type="text" id="r_upc" placeholder="UPC (если есть)"></div>
                        <button class="btn-primary" style="width: 100%; padding: 16px; margin-top: 20px;" onclick="submitRelease()">Отправить релиз на модерацию</button>
                    </div>
                    <div style="width: 300px;">
                        <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px;">Обложка <span class="req-star">*</span></label>
                        <div class="upload-box" id="r_cover_box" onclick="document.getElementById('r_cover').click()">
                            <span id="coverHint" class="text-sm">Нажмите для загрузки<br>1400x1400 / 3000x3000</span>
                            <img id="coverPreview" class="upload-img hidden">
                            <input type="file" id="r_cover" accept="image/*" class="hidden" onchange="handleCoverUpload(this)">
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-adminUsers" class="view-section hidden"><div id="adminUsersList"></div></div>
            <div id="sec-adminReleases" class="view-section hidden"><div id="adminReleasesList"></div></div>
        </div>
    </div>

<script>
    // --- ПОЛНЫЕ НАСТРОЙКИ FIREBASE С ТВОИХ СКРИНШОТОВ ---
    const firebaseConfig = {
        apiKey: "AIzaSyCha28N_EYVSNtYlSjYtY8IPCbK3PMo5EU",
        authDomain: "glambank.firebaseapp.com",
        databaseURL: "https://glambank-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "glambank",
        storageBucket: "glambank.firebasestorage.app",
        messagingSenderId: "727584536839",
        appId: "1:727584536839:web:7738aa5e220799e7e32da2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let authMode = 'login';
    let appState = { users: {}, releases: {}, chats: {} };
    let activeChatEmail = null;
    let base64Cover = null;

    // СЛУШАТЕЛЬ БАЗЫ ДАННЫХ В РЕАЛЬНОМ ВРЕМЕНИ
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        appState.users = data.users || {};
        appState.releases = data.releases || {};
        appState.chats = data.chats || {};
        if (currentUser) refreshUI();
    });

    function UIAlert(title, text) {
        document.getElementById('uiAlertTitle').innerText = title;
        document.getElementById('uiAlertText').innerText = text;
        document.getElementById('uiAlert').classList.remove('hidden');
    }

    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'reg' : 'login';
        document.getElementById('regFields').classList.toggle('hidden', authMode === 'login');
        document.getElementById('mainAuthBtn').innerText = authMode === 'login' ? 'Войти в кабинет' : 'Создать кабинет';
        document.getElementById('switchAuthBtn').innerText = authMode === 'login' ? 'Создать кабинет' : 'Уже есть аккаунт';
    }

    function getDeviceInfo() {
        return navigator.userAgent.includes("Chrome") ? "Chrome ПК" : (navigator.userAgent.includes("Safari") && !navigator.userAgent.includes("Chrome") ? "Safari" : "Opera/Другой");
    }

    async function processAuth() {
        const email = document.getElementById('authEmail').value.toLowerCase().trim();
        const pass = document.getElementById('authPassword').value;
        const login = document.getElementById('regLogin').value;

        if (!email.includes('@') || !pass) return UIAlert("Ошибка", "Заполните почту и пароль");

        // Вход Админа
        if (email === 'denisbiletskiy0@gmail.com' && pass === 'Retro!22848.lol') {
            currentUser = { email: email, login: 'Администратор', role: 'admin' };
            startApp();
            return;
        }

        const safeEmail = email.replace(/\./g, '_');

        if (authMode === 'login') {
            const user = appState.users[safeEmail];
            if (user && user.pass === pass) {
                if (user.isBanned) return UIAlert("Доступ закрыт", "Ваш аккаунт заблокирован");
                currentUser = user;
                currentUser.role = 'user';
                
                // Добавляем новое устройство, если человек зашел с другого браузера
                let devices = user.devices || [];
                const currentDevice = getDeviceInfo();
                if (!devices.includes(currentDevice)) {
                    devices.push(currentDevice);
                    await db.ref('users/' + safeEmail + '/devices').set(devices);
                }
                startApp();
            } else UIAlert("Ошибка", "Неверная почта или пароль");
        } else {
            if (!login) return UIAlert("Ошибка", "Укажите логин");
            if (appState.users[safeEmail]) return UIAlert("Ошибка", "Такая почта уже зарегистрирована");
            
            const newUser = { login, email, pass, isBanned: false, devices: [getDeviceInfo()] };
            await db.ref('users/' + safeEmail).set(newUser);
            currentUser = newUser;
            currentUser.role = 'user';
            startApp();
        }
    }

    function startApp() {
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('appView').classList.remove('hidden');
        document.getElementById('userNameDisplay').innerText = currentUser.login;
        
        if (currentUser.role === 'admin') {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('userSupportBtn').classList.add('hidden');
        } else {
            document.getElementById('userSupportBtn').classList.remove('hidden');
        }
        nav('overview');
    }

    function nav(section) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + section).classList.remove('hidden');
        document.querySelectorAll('.sidebar .menu-btn').forEach(b => b.classList.remove('active'));
        if(event && event.target && event.target.classList) event.target.classList.add('active');
        
        const titles = { 'overview': 'Обзор', 'yourMusic': 'Ваша музыка', 'newRelease': 'Новый релиз', 'adminUsers': 'Кабинеты', 'adminReleases': 'Все релизы', 'userChat': 'Связь с модератором', 'adminChats': 'Сообщения артистов' };
        document.getElementById('pageTitle').innerText = titles[section] || 'Раздел';
        
        refreshUI();
    }

    function handleCoverUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            base64Cover = reader.result;
            document.getElementById('coverPreview').src = base64Cover;
            document.getElementById('coverPreview').classList.remove('hidden');
            document.getElementById('coverHint').classList.add('hidden');
            document.getElementById('r_cover_box').classList.remove('error-field');
        };
    }

    async function submitRelease() {
        const title = document.getElementById('r_title').value;
        const artist = document.getElementById('r_artist').value;
        if (!title || !artist || !base64Cover) return UIAlert("Ошибка", "Заполните название, артиста и загрузите обложку!");

        const id = Date.now().toString();
        const releaseData = {
            id: id,
            userEmail: currentUser.email,
            type: document.getElementById('r_type').value,
            title: title,
            artist: artist,
            genre: document.getElementById('r_genre').value,
            year: document.getElementById('r_year').value,
            upc: document.getElementById('r_upc').value,
            status: 'Модерация',
            date: new Date().toLocaleDateString(),
            cover: base64Cover,
            adminIsrc: ''
        };

        await db.ref('releases/' + id).set(releaseData);
        UIAlert("Успешно", "Релиз отправлен на модерацию!");
        
        document.getElementById('r_title').value = '';
        document.getElementById('r_upc').value = '';
        base64Cover = null;
        document.getElementById('coverPreview').classList.add('hidden');
        document.getElementById('coverHint').classList.remove('hidden');
        
        nav('yourMusic');
    }

    // --- ЧАТИКИ ---
    async function sendMessage(role) {
        const inputId = role === 'user' ? 'userChatInput' : 'adminChatInput';
        const text = document.getElementById(inputId).value.trim();
        if (!text) return;

        const targetEmail = role === 'user' ? currentUser.email : activeChatEmail;
        if (!targetEmail) return;

        const safeEmail = targetEmail.replace(/\./g, '_');
        const newMsg = { from: role, text: text, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        
        // Добавляем сообщение в Firebase
        const chatRef = db.ref('chats/' + safeEmail);
        const currentMsgs = appState.chats[safeEmail] || [];
        currentMsgs.push(newMsg);
        await chatRef.set(currentMsgs);
        
        document.getElementById(inputId).value = '';
    }

    function selectAdminChat(email) {
        activeChatEmail = email;
        refreshUI();
    }

    // --- ОТРИСОВКА ИНТЕРФЕЙСА ---
    function refreshUI() {
        const allReleases = Object.values(appState.releases);
        const userReleases = allReleases.filter(r => r.userEmail === currentUser.email);
        const displayReleases = currentUser.role === 'admin' ? allReleases : userReleases;

        // Дашборд
        if (!document.getElementById('sec-overview').classList.contains('hidden')) {
            const mod = displayReleases.filter(r => r.status === 'Модерация').length;
            const ok = displayReleases.filter(r => r.status === 'Одобрен').length;
            document.getElementById('dashboardStats').innerHTML = `
                <div class="stat-card"><div class="stat-num" style="color: var(--warning);">${mod}</div><div class="stat-label">На модерации</div></div>
                <div class="stat-card"><div class="stat-num" style="color: var(--success);">${ok}</div><div class="stat-label">Принятых</div></div>
            `;
        }

        // Музыка артиста
        if (!document.getElementById('sec-yourMusic').classList.contains('hidden')) {
            document.getElementById('userReleasesList').innerHTML = userReleases.length ? userReleases.map(r => renderReleaseCard(r, false)).reverse().join('') : '<div class="empty-state"><h2>Нет релизов</h2></div>';
        }

        // Все релизы админа
        if (!document.getElementById('sec-adminReleases').classList.contains('hidden')) {
            document.getElementById('adminReleasesList').innerHTML = allReleases.length ? allReleases.map(r => renderReleaseCard(r, true)).reverse().join('') : '<p class="text-sm">Список пуст</p>';
        }

        // Кабинеты админа
        if (!document.getElementById('sec-adminUsers').classList.contains('hidden')) {
            document.getElementById('adminUsersList').innerHTML = Object.values(appState.users).map(u => `
                <div class="card">
                    <div>
                        <div style="font-weight: 600;">${u.login} <span style="font-weight: normal; color: var(--text-muted); font-size: 13px;">(${u.email})</span></div>
                        <div class="text-sm" style="margin-top:4px;">Браузеры входа: <span style="color:var(--success)">${u.devices ? u.devices.join(', ') : 'Неизвестно'}</span></div>
                    </div>
                    <button class="btn-outline" style="color: ${u.isBanned ? 'var(--success)' : 'var(--danger)'}; border-color: ${u.isBanned ? 'var(--success)' : 'var(--danger)'};" onclick="toggleBan('${u.email}')">${u.isBanned ? 'Разбанить' : 'Бан'}</button>
                </div>
            `).join('');
        }

        // Чат артиста
        if (!document.getElementById('sec-userChat').classList.contains('hidden')) {
            const msgs = appState.chats[currentUser.email.replace(/\./g, '_')] || [];
            const box = document.getElementById('userChatBox');
            box.innerHTML = msgs.length ? msgs.map(m => `<div class="msg ${m.from === 'admin' ? 'msg-them' : 'msg-me'}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('') : '<p class="text-sm" style="text-align:center;">Напишите модератору...</p>';
            box.scrollTop = box.scrollHeight;
        }

        // Чат админа
        if (!document.getElementById('sec-adminChats').classList.contains('hidden')) {
            const users = Object.values(appState.users);
            document.getElementById('adminChatUserList').innerHTML = users.map(u => {
                const safeEmail = u.email.replace(/\./g, '_');
                const msgs = appState.chats[safeEmail] || [];
                const lastMsg = msgs.length ? msgs[msgs.length-1].text : 'Нет сообщений';
                return `<div class="admin-chat-user ${activeChatEmail === u.email ? 'active' : ''}" onclick="selectAdminChat('${u.email}')"><div style="font-weight: 600; margin-bottom:4px;">${u.login}</div><div class="text-sm" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: ${msgs.length ? '#fff' : 'var(--text-muted)'};">${lastMsg}</div></div>`;
            }).join('');

            if (activeChatEmail) {
                const msgs = appState.chats[activeChatEmail.replace(/\./g, '_')] || [];
                const box = document.getElementById('adminChatBox');
                box.innerHTML = msgs.length ? msgs.map(m => `<div class="msg ${m.from === 'admin' ? 'msg-me' : 'msg-them'}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('') : '<p class="text-sm" style="text-align:center; margin-top:20px;">Диалог пуст</p>';
                box.scrollTop = box.scrollHeight;
                document.getElementById('adminChatInputArea').classList.remove('hidden');
            }
        }
    }

    function renderReleaseCard(r, isAdmin) {
        let status = r.status === 'Модерация' ? '<span class="badge badge-mod">Модерация</span>' : '<span class="badge badge-ok">Одобрен</span>';
        let actions = '';
        if (isAdmin) {
            actions = `<button class="btn-outline" style="padding: 6px 10px; font-size: 12px; margin-right: 8px;" onclick="viewReleaseAdmin('${r.id}')">Подробнее</button>`;
            if (r.status === 'Модерация') {
                actions += `<button class="btn-outline" style="padding: 6px; border-color: var(--success); color: var(--success); margin-right: 8px;" onclick="admApprove('${r.id}')">✓ Принять</button>`;
            }
        }
        return `<div class="card"><div style="display: flex; align-items: center; flex: 1;"><img src="${r.cover || ''}" class="card-cover"><div><div style="font-weight: 600; font-size: 16px;">${r.title} <span style="font-weight: normal; color: var(--text-muted); font-size: 14px;">— ${r.type}</span></div><div class="text-sm" style="margin-top: 4px;">${r.artist} ${isAdmin ? `• От: ${r.userEmail}` : ''}</div></div></div><div style="display: flex; align-items: center;">${status}${actions ? `<div style="margin-left: 16px; border-left: 1px solid var(--border); padding-left: 16px; display:flex;">${actions}</div>` : ''}</div></div>`;
    }

    async function toggleBan(email) {
        const safeEmail = email.replace(/\./g, '_');
        const user = appState.users[safeEmail];
        await db.ref('users/' + safeEmail + '/isBanned').set(!user.isBanned);
    }

    async function admApprove(id) {
        let upcCode = prompt("Вставьте присвоенный UPC (если есть):", "");
        let isrcCode = prompt("Вставьте присвоенный ISRC:", "");
        await db.ref('releases/' + id + '/status').set('Одобрен');
        if (upcCode) await db.ref('releases/' + id + '/upc').set(upcCode);
        if (isrcCode) await db.ref('releases/' + id + '/adminIsrc').set(isrcCode);
    }

    function viewReleaseAdmin(id) {
        const r = appState.releases[id];
        document.getElementById('admRelCover').src = r.cover || '';
        document.getElementById('admRelInfo').innerHTML = `
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 4px;">${r.title}</div>
            <div style="color: var(--text-muted); margin-bottom: 24px; font-size: 16px;">Артист: ${r.artist}</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 14px; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 8px; border: 1px solid var(--border);">
                <div><b style="color: #ccc;">Формат:</b> ${r.type}</div>
                <div><b style="color: #ccc;">Жанр:</b> ${r.genre}</div>
                <div><b style="color: #ccc;">Год:</b> ${r.year}</div>
                <div><b style="color: #ccc;">UPC:</b> ${r.upc || '<span style="color:#777">Не указан</span>'}</div>
                <div><b style="color: #ccc;">ISRC от модератора:</b> ${r.adminIsrc || '<span style="color:#777">Не присвоен</span>'}</div>
                <div style="grid-column: span 2;"><b style="color: #ccc;">Статус модерации:</b> ${r.status}</div>
            </div>`;
        document.getElementById('adminReleaseModal').classList.remove('hidden');
    }
</script>
</body>
</html>
