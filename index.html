<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamBank | Лейбл переходник</title>
    <style>
        :root {
            --bg-dark: #050810;
            --bg-panel: #0D111D;
            --text-main: #E5E7EB;
            --text-muted: #9CA3AF;
            --accent: #1E40AF;
            --accent-bright: #3B82F6;
            --border: #1F2937;
            --danger: #991B1B;
            --success: #065F46;
            --warning: #92400E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Auth Screen */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: var(--bg-panel); padding: 40px; border-radius: 12px; width: 400px; border: 1px solid var(--border); }
        
        /* Ban Screen */
        .ban-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

        /* Layout */
        .dashboard { display: flex; height: 100vh; }
        .sidebar { width: 280px; background-color: var(--bg-panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-dark); }
        
        /* UI */
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-bright); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-highlight { background: transparent; border: 2px solid var(--accent-bright); color: white; margin-bottom: 20px; }
        
        /* Menu */
        .menu-item { background: transparent; text-align: left; padding: 10px; margin-bottom: 5px; color: var(--text-muted); font-size: 15px; border: none; width: 100%; }
        .menu-item:hover { color: white; }

        /* Release Cards */
        .release-item { background: var(--bg-panel); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .tag-mod { background: var(--warning); color: white; }
        .tag-ok { background: var(--success); color: white; }
        .tag-no { background: var(--danger); color: white; cursor: pointer; }

        /* Forms */
        .form-flex { display: flex; gap: 30px; }
        .cover-box { width: 300px; height: 300px; border: 2px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: #000; position: relative; }
        .cover-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg-panel); padding: 30px; border-radius: 12px; width: 450px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="banView" class="ban-screen hidden">
        <h1 style="font-size: 40px; margin-bottom: 20px;">Ваш кабинет был закрыт.</h1>
        <button class="btn-primary" onclick="alert(currentUser.banReason)">Узнать причину</button>
        <button class="btn-outline" onclick="logout()" style="margin-top: 20px;">Выход</button>
    </div>

    <div id="authView" class="auth-container">
        <div class="auth-box">
            <h2 style="text-align: center; margin-bottom: 10px;">GlamBank</h2>
            <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 30px; opacity: 0.5;">Лейбл переходник</p>
            
            <div id="regFields" class="hidden">
                <input type="text" id="regLogin" placeholder="Логин">
            </div>
            <input type="email" id="authEmail" placeholder="Почта">
            <input type="password" id="authPassword" placeholder="Пароль">
            
            <button class="btn-primary" id="mainAuthBtn" style="width: 100%;" onclick="processAuth()">Войти в кабинет</button>
            <button class="btn-outline" id="switchAuthBtn" style="width: 100%; margin-top: 10px;" onclick="toggleAuthMode()">Создать кабинет</button>
        </div>
    </div>

    <div id="mainView" class="dashboard hidden">
        <div class="sidebar">
            <div style="margin-bottom: 40px;">
                <h2 style="letter-spacing: 1px;">GlamBank</h2>
                <span style="font-size: 10px; opacity: 0.4;">Лейбл переходник</span>
            </div>

            <button class="btn-highlight" onclick="showSection('newRelease')">Новый релиз</button>
            <button class="menu-item" onclick="showSection('overview')">Обзор</button>
            <button class="menu-item" onclick="showSection('overview')">Ваша музыка</button>

            <div id="adminPanel" class="hidden" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);">
                <p style="color: var(--accent-bright); font-size: 11px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase;">Админка</p>
                <button class="menu-item" onclick="showSection('adminUsers')">Все кабинеты</button>
                <button class="menu-item" onclick="showSection('adminReleases')">Все релизы</button>
            </div>

            <div style="margin-top: auto;">
                <button class="btn-outline" style="width: 100%; color: var(--danger); border-color: var(--danger);" onclick="logout()">Выход</button>
            </div>
        </div>

        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1 id="sectionTitle">Обзор</h1>
                <div onclick="openProfile()" style="cursor: pointer; color: var(--text-muted);" id="userDisplay"></div>
            </div>

            <div id="sec-overview" class="content-section">
                <div id="myReleasesList"></div>
            </div>

            <div id="sec-newRelease" class="content-section hidden">
                <select id="relType" style="width: 200px;" onchange="toggleReleaseForm()">
                    <option value="">Выберите формат</option>
                    <option value="Сингл">Сингл</option>
                    <option value="Альбом/EP">Альбом/EP</option>
                </select>

                <div id="releaseForm" class="hidden" style="margin-top: 30px;">
                    <div class="form-flex">
                        <div>
                            <div class="cover-box" onclick="document.getElementById('fileCover').click()">
                                <p id="coverHint">Добавить обложку<br>1400x1400 / 3000x3000</p>
                                <img id="coverPreview" class="cover-preview hidden">
                                <input type="file" id="fileCover" accept="image/*" class="hidden" onchange="previewImg(this)">
                            </div>
                        </div>
                        <div style="flex: 1;">
                            <input type="text" id="f_title" placeholder="Имя релиза">
                            <input type="text" id="f_artist" placeholder="Имя артиста">
                            <input type="text" id="f_version" placeholder="Версия (необязательно)">
                            <input type="text" id="f_author" placeholder="Автор слов">
                            <input type="text" id="f_comp" placeholder="Композитор">
                            
                            <select id="f_type">
                                <option value="Original">Original</option>
                                <option value="Cover">Cover</option>
                                <option value="Cover by cover band">Cover by cover band</option>
                                <option value="Karaoke">Karaoke</option>
                                <option value="Medley">Medley</option>
                                <option value="Remix">Remix</option>
                            </select>
                            
                            <input type="text" id="f_lang" placeholder="Язык названия трека">
                            
                            <select id="f_genre">
                                <option value="">Выберите жанр</option>
                                <option value="Pop">Pop</option>
                                <option value="Hip Hop/Rap">Hip Hop/Rap</option>
                                <option value="Rock">Rock</option>
                                <option value="Electronic">Electronic</option>
                                <option value="Jazz">Jazz</option>
                            </select>

                            <textarea id="f_lyrics" placeholder="Текст песни (необязательно)"></textarea>
                            
                            <select id="f_explicit">
                                <option value="Нет">Присутствие нецензурной лексики: Нет</option>
                                <option value="Да">Присутствие нецензурной лексики: Да</option>
                            </select>

                            <input type="text" id="f_isrc" placeholder="ISRC (если есть)">
                            <select id="f_year"></select>

                            <div style="border: 1px solid var(--border); padding: 15px; border-radius: 6px; margin-bottom: 20px;">
                                <p style="font-size: 12px; margin-bottom: 10px;">Файл трека (MP3, до 10мб)</p>
                                <input type="file" id="fileAudio" accept=".mp3">
                            </div>

                            <textarea id="f_mod_comm" placeholder="Комментарий модераторам"></textarea>
                            
                            <button class="btn-primary" style="width: 100%;" onclick="sendToModeration()">Отправить на модерацию</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-adminUsers" class="content-section hidden">
                <div id="adminUsersList"></div>
            </div>

            <div id="sec-adminReleases" class="content-section hidden">
                <div id="adminQueue"></div>
            </div>
        </div>
    </div>

    <div id="modalBase" class="modal hidden">
        <div class="modal-content" id="modalInner"></div>
    </div>

<script>
    const ADMIN_EMAIL = 'denisbiletskiy0@gmail.com';
    const FORMSPREE = 'https://formspree.io/f/mzdywnyq';

    let db = JSON.parse(localStorage.getItem('gb_data')) || { users: [], releases: [] };
    let currentUser = null;
    let mode = 'login';

    // Года для формы
    const yearBox = document.getElementById('f_year');
    for(let y=2026; y>=2000; y--) yearBox.innerHTML += `<option value="${y}">${y}</option>`;

    function save() { localStorage.setItem('gb_data', JSON.stringify(db)); }

    function toggleAuthMode() {
        mode = (mode === 'login') ? 'reg' : 'login';
        document.getElementById('regFields').classList.toggle('hidden', mode === 'login');
        document.getElementById('mainAuthBtn').innerText = (mode === 'login') ? 'Войти в кабинет' : 'Создать кабинет';
        document.getElementById('switchAuthBtn').innerText = (mode === 'login') ? 'Создать кабинет' : 'Уже есть аккаунт';
    }

    function processAuth() {
        const email = document.getElementById('authEmail').value.toLowerCase().trim();
        const pass = document.getElementById('authPassword').value;
        const login = document.getElementById('regLogin').value;

        if(!email.includes('@')) return alert("Введите реальную почту");

        if(mode === 'login') {
            const user = db.users.find(u => u.email === email && u.pass === pass);
            if(email === ADMIN_EMAIL && pass === 'Retro!22848.lol') {
                currentUser = { email: ADMIN_EMAIL, login: 'Администратор', role: 'admin' };
                startSession();
            } else if(user) {
                currentUser = user;
                startSession();
            } else {
                alert("Ошибка входа");
            }
        } else {
            if(db.users.find(u => u.email === email)) return alert("Почта занята");
            const newUser = { email, pass, login, isBanned: false, banReason: '', id: Date.now() };
            db.users.push(newUser);
            save();
            currentUser = newUser;
            startSession();
        }
    }

    function startSession() {
        if(currentUser.isBanned) {
            document.getElementById('banView').classList.remove('hidden');
            return;
        }
        document.getElementById('authView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('userDisplay').innerText = currentUser.login;
        
        // КРИТИЧЕСКОЕ ПРАВИЛО: Кнопки админа только для одного Email
        if(currentUser.email === ADMIN_EMAIL) {
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            document.getElementById('adminPanel').classList.add('hidden');
        }
        showSection('overview');
    }

    function logout() { location.reload(); }

    function showSection(name) {
        if(currentUser.isBanned) return alert("Кабинет заблокирован");
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + name).classList.remove('hidden');
        document.getElementById('sectionTitle').innerText = (name === 'overview') ? 'Обзор' : 
                                                            (name === 'newRelease') ? 'Новый релиз' : 
                                                            (name === 'adminUsers') ? 'Все кабинеты' : 'Все релизы';
        if(name === 'overview') renderUserReleases();
        if(name === 'adminUsers') renderAdminUsers();
        if(name === 'adminReleases') renderAdminQueue();
    }

    // Обработка обложки
    let coverOk = false;
    function previewImg(input) {
        const file = input.files[0];
        if(!file) return;
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = function() {
            if((this.width === 1400 || this.width === 3000) && (this.width === this.height)) {
                coverOk = true;
                document.getElementById('coverPreview').src = img.src;
                document.getElementById('coverPreview').classList.remove('hidden');
                document.getElementById('coverHint').classList.add('hidden');
            } else {
                coverOk = false;
                alert("Размер должен быть 1400x1400 или 3000x3000px");
            }
        };
    }

    function toggleReleaseForm() {
        document.getElementById('releaseForm').classList.toggle('hidden', !document.getElementById('relType').value);
    }

    function sendToModeration() {
        const audio = document.getElementById('fileAudio').files[0];
        if(!coverOk) return alert("Загрузите правильную обложку");
        if(!audio || audio.size > 10 * 1024 * 1024) return alert("Нужен MP3 до 10мб");

        const data = {
            id: Date.now(),
            userId: currentUser.id || 'admin',
            userEmail: currentUser.email,
            name: document.getElementById('f_title').value,
            artist: document.getElementById('f_artist').value,
            genre: document.getElementById('f_genre').value,
            status: 'Модерация',
            date: new Date().toLocaleDateString(),
            upc: '', isrc_assigned: ''
        };

        db.releases.push(data);
        save();
        
        // Отправка на почту
        fetch(FORMSPREE, {
            method: 'POST',
            body: JSON.stringify(data),
            headers: {'Content-Type': 'application/json', 'Accept': 'application/json'}
        });

        alert("Отправлено!");
        showSection('overview');
    }

    function renderUserReleases() {
        const box = document.getElementById('myReleasesList');
        const my = db.releases.filter(r => r.userEmail === currentUser.email);
        if(!my.length) { box.innerHTML = "пока нет релизов"; return; }
        
        box.innerHTML = my.map(r => `
            <div class="release-item">
                <div>
                    <p style="font-weight:bold">${r.name}</p>
                    <p style="font-size:12px; opacity:0.6">${r.artist}</p>
                    <p style="font-size:11px; margin-top:5px">Дата релиза: ${r.date} | Жанр: ${r.genre}</p>
                    ${r.upc ? `<p style="font-size:10px; color:var(--accent-bright)">UPC: ${r.upc} | ISRC: ${r.isrc_assigned}</p>` : ''}
                </div>
                <div class="status-tag ${r.status==='Модерация'?'tag-mod':r.status==='Одобрен'?'tag-ok':'tag-no'}" 
                     onclick="${r.status==='Отклонён'?`alert('Причина: '+r.rejectReason)` : ''}">
                    ${r.status} ${r.status==='Отклонён'?'ⓘ':''}
                </div>
            </div>
        `).join('');
    }

    // --- АДМИН-ЛОГИКА ---
    function renderAdminUsers() {
        const box = document.getElementById('adminUsersList');
        box.innerHTML = db.users.map(u => `
            <div class="release-item">
                <div>
                    <p>${u.login} (${u.email})</p>
                    <p style="font-size:11px; opacity:0.5">Релизов: ${db.releases.filter(r=>r.userEmail===u.email).length}</p>
                </div>
                <button class="btn-outline" style="color:red" onclick="blockUser('${u.email}')">${u.isBanned?'Разбанить':'Закрыть кабинет'}</button>
            </div>
        `).join('');
    }

    function blockUser(email) {
        const reason = prompt("Почему закрывают кабинет?");
        if(!reason) return;
        const u = db.users.find(x => x.email === email);
        u.isBanned = true;
        u.banReason = reason;
        save();
        renderAdminUsers();
    }

    function renderAdminQueue() {
        const box = document.getElementById('adminQueue');
        const queue = db.releases.filter(r => r.status === 'Модерация');
        box.innerHTML = queue.map(r => `
            <div class="release-item">
                <div><p>${r.name} - ${r.artist}</p><p style="font-size:11px">${r.userEmail}</p></div>
                <div style="display:flex; gap:10px">
                    <button class="btn-primary" onclick="approveRelease(${r.id})">Принять</button>
                    <button class="btn-outline" style="color:red" onclick="rejectRelease(${r.id})">Отклонить</button>
                </div>
            </div>
        `).join('');
    }

    function approveRelease(id) {
        const upc = prompt("Вставьте UPC");
        const isrc = prompt("Вставьте ISRC");
        const r = db.releases.find(x => x.id === id);
        r.status = 'Одобрен';
        r.upc = upc;
        r.isrc_assigned = isrc;
        save();
        renderAdminQueue();
    }

    function rejectRelease(id) {
        const reason = prompt("Причина отклонения релиза");
        const r = db.releases.find(x => x.id === id);
        r.status = 'Отклонён';
        r.rejectReason = reason;
        save();
        renderAdminQueue();
    }

    function openProfile() {
        if(currentUser.email === ADMIN_EMAIL) return;
        const newLogin = prompt("Изменить логин?", currentUser.login);
        const newPass = prompt("Изменить пароль?", currentUser.pass);
        if(newLogin) currentUser.login = newLogin;
        if(newPass) currentUser.pass = newPass;
        save();
        startSession();
    }
</script>
</body>
</html>
