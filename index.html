<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamBank | Лейбл переходник</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root { --bg-body: #0A0A0A; --bg-panel: #111111; --bg-glass: rgba(255, 255, 255, 0.03); --border: #222222; --text-main: #FFFFFF; --text-muted: #888888; --accent: #FFFFFF; --accent-bg: #E5E5E5; --danger: #FF3B30; --success: #34C759; --warning: #FF9500; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow: hidden; font-size: 14px; }
        .hidden { display: none !important; }

        .app { display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: var(--bg-panel); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-body); position: relative; }

        h1 { font-size: 28px; font-weight: 600; margin-bottom: 24px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px 24px; border-radius: var(--radius); text-align: center; }
        .stat-num { font-size: 40px; font-weight: 700; margin-bottom: 8px; }
        
        .menu-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 12px 16px; color: var(--text-muted); border-radius: 8px; margin-bottom: 4px; transition: 0.2s; cursor: pointer; }
        .menu-btn:hover, .menu-btn.active { background: var(--bg-glass); color: var(--text-main); }
        .menu-btn.active { border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; }

        .btn-primary { background: var(--accent); color: #000; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; border: none; }
        
        /* Чат */
        .chat-wrap { height: calc(100vh - 250px); background: #000; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; }
        .msg-me { background: var(--accent); color: #000; align-self: flex-end; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; max-width: 80%; margin-left: auto; }
        .chat-input { display: flex; padding: 15px; gap: 10px; border-top: 1px solid var(--border); }
        .chat-input input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="appView" class="app">
        <div class="sidebar">
            <h2 style="margin-bottom: 30px;">GlamBank</h2>
            <button class="btn-primary" style="margin-bottom: 20px;">+ Новый релиз</button>
            <button class="menu-btn active" onclick="nav('overview')">Обзор</button>
            <button class="menu-btn" onclick="nav('yourMusic')">Ваша музыка</button>
            <p style="font-size: 11px; color: var(--text-muted); margin: 20px 0 10px 16px;">ПОДДЕРЖКА</p>
            <button class="menu-btn" onclick="nav('userChat')">Связь с модератором</button>
            <div style="margin-top: auto;">
                <p id="userNameDisplay" style="margin-bottom: 5px;">Артист</p>
                <p style="color: var(--danger); cursor: pointer; font-size: 12px;" onclick="location.reload()">Выйти</p>
            </div>
        </div>

        <div class="content">
            <div id="sec-overview" class="view-section">
                <h1>Обзор</h1>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Статистика по вашим релизам</p>
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-num" style="color: var(--warning);">0</div><p>НА МОДЕРАЦИИ</p></div>
                    <div class="stat-card"><div class="stat-num" style="color: var(--success);">0</div><p>ПРИНЯТЫХ</p></div>
                    <div class="stat-card"><div class="stat-num" style="color: var(--danger);">0</div><p>ОТКЛОНЁННЫХ</p></div>
                </div>
            </div>

            <div id="sec-yourMusic" class="view-section hidden">
                <h1>Ваша музыка</h1>
                <div style="text-align: center; margin-top: 100px;">
                    <p style="margin-bottom: 20px;">Нет релизов</p>
                    <button class="btn-primary" style="width: auto; padding: 12px 30px;">Создайте свой первый релиз</button>
                </div>
            </div>

            <div id="sec-userChat" class="view-section hidden">
                <h1>Связь с модератором</h1>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Здесь вы можете задать вопросы администрации или обсудить ваш релиз.</p>
                <div class="chat-wrap">
                    <div class="chat-msgs" id="chatBox">
                        <div class="msg-me">Здравствуйте! Отзовите пожалуйста релиз "письковна".<br><small>22:17</small></div>
                    </div>
                    <div class="chat-input">
                        <input type="text" placeholder="Напишите сообщение...">
                        <button class="btn-primary" style="width: auto;">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // Настройки твоей базы
    const firebaseConfig = {
        apiKey: "AIzaSyCha28N_EYVSNtYlSjYtY8IPCbK3PMo5EU",
        authDomain: "glambank.firebaseapp.com",
        databaseURL: "https://glambank-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "glambank",
        storageBucket: "glambank.firebaseestorage.app",
        messagingSenderId: "727584536839",
        appId: "1:727584536839:web:7738aa5e220799e7e32da2"
    };
    firebase.initializeApp(firebaseConfig);

    function nav(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>
</body>
</html>
