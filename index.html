<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamBank | Лейбл переходник</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root { --bg-body: #0A0A0A; --bg-panel: #111111; --bg-glass: rgba(255, 255, 255, 0.03); --border: #222222; --text-main: #FFFFFF; --text-muted: #888888; --accent: #FFFFFF; --accent-bg: #E5E5E5; --danger: #FF3B30; --success: #34C759; --warning: #FF9500; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow: hidden; font-size: 14px; }
        .hidden { display: none !important; }

        /* Анимации */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app { display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: var(--bg-panel); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-body); position: relative; }

        /* Формы */
        .form-group { margin-bottom: 16px; width: 100%; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 14px 16px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: #555; outline: none; }
        .error-field { border-color: var(--danger) !important; }

        /* Кнопки */
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; font-size: 14px; }
        button:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-bg); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.2); }

        .menu-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 12px 16px; color: var(--text-muted); border-radius: 8px; margin-bottom: 4px; transition: 0.2s; }
        .menu-btn.active { background: var(--bg-glass); color: var(--text-main); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; }

        /* Карточки релизов (Больше и Красивее) */
        .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .card:hover { transform: translateX(5px); border-color: #444; }
        .card-cover { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; margin-right: 20px; border: 1px solid var(--border); }
        .card-info h3 { font-size: 18px; margin-bottom: 5px; }
        .card-info p { color: var(--text-muted); font-size: 14px; }

        .badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .badge-mod { background: rgba(255, 149, 0, 0.15); color: var(--warning); }
        .badge-ok { background: rgba(52, 199, 89, 0.15); color: var(--success); }
        .badge-err { background: rgba(255, 59, 48, 0.15); color: var(--danger); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .dialog { background: var(--bg-panel); border: 1px solid var(--border); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 450px; }

        .upload-box { width: 100%; max-width: 300px; aspect-ratio: 1; border: 1px dashed var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: var(--bg-glass); position: relative; overflow: hidden; }
        .upload-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="uiAlert" class="overlay hidden"><div class="dialog"><h3 id="uiAlertTitle"></h3><p id="uiAlertText" style="margin: 16px 0 24px; color: #ccc;"></p><button class="btn-primary" style="width: 100%;" onclick="this.parentElement.parentElement.classList.add('hidden')">Понятно</button></div></div>
    
    <div id="uiDraftConfirm" class="overlay hidden">
        <div class="dialog">
            <h3>Несохраненные изменения</h3>
            <p style="margin: 16px 0 24px; color: #ccc;">Вы хотите сохранить этот релиз как черновик или удалить его?</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-primary" id="draftSaveBtn">Сохранить черновик</button>
                <button class="btn-danger" id="draftDeleteBtn">Удалить изменения</button>
                <button class="btn-outline" onclick="document.getElementById('uiDraftConfirm').classList.add('hidden')">Продолжить редактирование</button>
            </div>
        </div>
    </div>

    <div id="appView" class="app">
        <div class="sidebar">
            <h2 style="margin-bottom: 32px;">GlamBank</h2>
            <button class="btn-primary" style="margin-bottom: 24px;" onclick="startNewRelease()">+ Новый релиз</button>
            <button class="menu-btn active" id="btn-overview" onclick="nav('overview')">Обзор</button>
            <button class="menu-btn" id="btn-yourMusic" onclick="nav('yourMusic')">Ваша музыка</button>
            <button class="menu-btn" id="btn-userChat" onclick="nav('userChat')">Поддержка</button>
            
            <div id="adminPanel" class="hidden">
                <p style="font-size: 11px; color: var(--text-muted); margin: 20px 0 10px 16px;">УПРАВЛЕНИЕ</p>
                <button class="menu-btn" onclick="nav('adminReleases')">Все релизы</button>
                <button class="menu-btn" onclick="nav('adminUsers')">Кабинеты</button>
            </div>

            <div style="margin-top: auto; padding: 16px; background: #000; border-radius: 8px; border: 1px solid var(--border);">
                <p id="userNameDisplay" style="font-weight: 500;">Артист</p>
                <button style="background:none; color:var(--danger); padding:0; margin-top:8px; font-size:12px;" onclick="location.reload()">Выйти</button>
            </div>
        </div>

        <div class="content">
            <div id="sec-overview" class="view-section fade-in">
                <h1>Обзор</h1>
                <div class="stat-grid" id="statsHtml"></div>
            </div>

            <div id="sec-yourMusic" class="view-section hidden">
                <h1>Ваша музыка</h1>
                <input type="text" id="searchMusic" placeholder="Поиск по названию или UPC..." oninput="renderYourMusic()" style="margin-bottom: 24px; border-radius: 20px;">
                <div id="musicList"></div>
            </div>

            <div id="sec-newRelease" class="view-section hidden">
                <h1 id="releaseFormTitle">Новый релиз</h1>
                <div style="display: flex; gap: 40px;">
                    <div style="flex: 1;">
                        <div class="form-group"><label>Формат *</label><select id="r_type" onchange="toggleReleaseType()"><option value="Сингл">Сингл</option><option value="Альбом/EP">Альбом/EP</option></select></div>
                        <div class="form-group"><label>Название *</label><input type="text" id="r_title"></div>
                        <div class="form-group"><label>Артист *</label><input type="text" id="r_artist"></div>
                        <div style="display: flex; gap: 16px;">
                            <div class="form-group"><label>Жанр *</label><select id="r_genre"><option>Pop</option><option>Hip Hop</option><option>Rock</option><option>Electronic</option></select></div>
                            <div class="form-group"><label>Год *</label><select id="r_year"></select></div>
                        </div>
                        <div class="form-group"><label>Дата выхода *</label><input type="date" id="r_date"></div>
                    </div>
                    <div style="width: 300px;">
                        <label style="font-size: 12px; color: var(--text-muted);">Обложка (1400x1400+) *</label>
                        <div class="upload-box" onclick="document.getElementById('f_cover').click()">
                            <img id="prev_cover" class="upload-img hidden">
                            <span id="cover_hint">Загрузить</span>
                            <input type="file" id="f_cover" class="hidden" accept="image/*" onchange="uploadFile(this, 'covers')">
                        </div>
                    </div>
                </div>
                <div id="trackArea" style="margin-top: 32px;">
                    <h3>Треки</h3>
                    <div id="trackList" style="margin: 16px 0;"></div>
                    <button class="btn-outline" onclick="document.getElementById('f_audio').click()">+ Добавить аудио</button>
                    <input type="file" id="f_audio" class="hidden" accept="audio/*" onchange="uploadFile(this, 'audio')">
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 40px; padding: 20px;" onclick="submitRelease()">Отправить на модерацию</button>
            </div>
        </div>
    </div>

<script>
    // Инициализация
    const firebaseConfig = {
        apiKey: "AIzaSyCha28N_EYVSNtYlSjYtY8IPCbK3PMo5EU",
        authDomain: "glambank.firebaseapp.com",
        databaseURL: "https://glambank-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "glambank",
        storageBucket: "glambank.firebasestorage.app",
        messagingSenderId: "727584536839",
        appId: "1:727584536839:web:7738aa5e220799e7e32da2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentUser = { id: "user_1", email: "test@test.com", login: "DANYX XAEP" }; // Для теста
    let appState = { releases: [] };
    let draft = { id: null, coverUrl: null, tracks: [] };
    let isChanged = false;

    // Заполнение годов 2000-2026
    const yearSelect = document.getElementById('r_year');
    for(let y=2026; y>=2000; y--) yearSelect.innerHTML += `<option value="${y}">${y}</option>`;

    // Навигация с проверкой черновика
    function nav(sec, force = false) {
        if (currentSection === 'newRelease' && isChanged && !force) {
            document.getElementById('uiDraftConfirm').classList.remove('hidden');
            document.getElementById('draftSaveBtn').onclick = () => { saveAsDraft(); document.getElementById('uiDraftConfirm').classList.add('hidden'); nav(sec, true); };
            document.getElementById('draftDeleteBtn').onclick = () => { isChanged = false; document.getElementById('uiDraftConfirm').classList.add('hidden'); nav(sec, true); };
            return;
        }

        currentSection = sec;
        document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + sec).classList.remove('hidden');
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('btn-' + sec);
        if(btn) btn.classList.add('active');
        
        if(sec === 'yourMusic') renderYourMusic();
        if(sec === 'overview') renderStats();
    }
    let currentSection = 'overview';

    // Загрузка файлов в Storage (Быстро!)
    async function uploadFile(input, folder) {
        const file = input.files[0];
        if(!file) return;

        const path = `${folder}/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        
        // Показываем, что идет загрузка (опционально)
        UI.alert("Загрузка...", "Пожалуйста, подождите, файл отправляется в облако.");

        try {
            await ref.put(file);
            const url = await ref.getDownloadURL();
            
            if(folder === 'covers') {
                draft.coverUrl = url;
                document.getElementById('prev_cover').src = url;
                document.getElementById('prev_cover').classList.remove('hidden');
                document.getElementById('cover_hint').classList.add('hidden');
            } else {
                draft.tracks.push({ id: Date.now(), title: file.name, url: url, isFilled: false });
                renderTracks();
            }
            isChanged = true;
            document.getElementById('uiAlert').classList.add('hidden');
        } catch(e) {
            UI.alert("Ошибка", "Не удалось загрузить файл.");
        }
    }

    function renderYourMusic() {
        const list = document.getElementById('musicList');
        const search = document.getElementById('searchMusic').value.toLowerCase();
        
        const filtered = appState.releases.filter(r => 
            r.userEmail === currentUser.email && 
            (r.title.toLowerCase().includes(search) || (r.upc && r.upc.includes(search)))
        );

        list.innerHTML = filtered.length ? filtered.map(r => `
            <div class="card fade-in">
                <div style="display:flex; align-items:center;">
                    <img src="${r.coverUrl}" class="card-cover">
                    <div class="card-info">
                        <h3>${r.title}</h3>
                        <p>${r.artist} • ${r.tracks.length} треков</p>
                        <p style="font-size:11px; margin-top:4px;">UPC: ${r.upc || 'Присваивается...'}</p>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
                    <span class="badge ${r.status === 'Модерация' ? 'badge-mod' : 'badge-ok'}">${r.status}</span>
                    ${r.status === 'Модерация' ? `<button class="btn-danger" style="font-size:11px; padding:5px 10px;" onclick="revokeRelease('${r.id}')">Отозвать</button>` : ''}
                </div>
            </div>
        `).reverse().join('') : '<p style="text-align:center; color:#555;">Тут пока пусто...</p>';
    }

    async function revokeRelease(id) {
        if(confirm("Отозвать релиз? Он вернется в черновики.")) {
            await db.ref('releases/' + id + '/status').set('Черновик');
            nav('yourMusic', true);
        }
    }

    // Слушатель базы данных
    db.ref('releases').on('value', (snap) => {
        const data = snap.val();
        appState.releases = data ? Object.values(data) : [];
        refreshUI();
    });

    function refreshUI() {
        if(currentSection === 'yourMusic') renderYourMusic();
        if(currentSection === 'overview') renderStats();
    }

    function renderStats() {
        const my = appState.releases.filter(r => r.userEmail === currentUser.email && r.status !== 'Черновик');
        const mod = my.filter(r => r.status === 'Модерация').length;
        const ok = my.filter(r => r.status === 'Одобрен').length;
        const err = my.filter(r => r.status === 'Отклонён').length;

        document.getElementById('statsHtml').innerHTML = `
            <div class="stat-card"><h3>${mod}</h3><p>НА МОДЕРАЦИИ</p></div>
            <div class="stat-card"><h3>${ok}</h3><p>ПРИНЯТЫХ</p></div>
            <div class="stat-card"><h3>${err}</h3><p>ОТКЛОНЁННЫХ</p></div>
        `;
    }

    // Глобальный объект UI
    window.UI = UI;
</script>
</body>
</html>
